<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-MAX TITAN | THE ULTIMATE IMPERIAL EDITION 2026</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

    <style>
        /* [SECTION 1: GLOBAL DESIGN SYSTEM] */
        :root {
            --primary: #8b5cf6; --primary-glow: rgba(139, 92, 246, 0.4);
            --bg: #020617; --surface: #0f172a; --border: #1e293b;
            --text: #f8fafc; --accent: #10b981; --gold: #f59e0b; --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; width: 100vw; }

        /* BOOT SCREEN */
        .boot-wrapper { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .boot-logo { font-family: 'Orbitron'; font-size: 80px; font-weight: 900; color: var(--primary); text-shadow: 0 0 30px var(--primary-glow); }
        .boot-bar-bg { margin-top: 40px; width: 250px; height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        #boot-bar-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.4s; }

        /* APP LAYOUT */
        #e-max-app { display: none; height: 100vh; flex-direction: column; position: relative; }
        
        .top-nav { position: absolute; top: 0; width: 100%; height: 100px; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; pointer-events: none; }
        .u-pill { pointer-events: auto; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); padding: 12px 22px; border-radius: 50px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .u-pill img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }

        .balance-trigger { pointer-events: auto; background: linear-gradient(135deg, var(--accent), #059669); padding: 14px 28px; border-radius: 50px; font-weight: 900; cursor: pointer; }

        #map-engine { flex: 1; z-index: 10; background: #010409; }

        /* INTERACTIVE CONSOLE */
        .main-console { position: absolute; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(40px); border-radius: 45px 45px 0 0; padding: 40px 30px 60px; border-top: 1px solid var(--border); z-index: 2000; }
        .input-mega { background: #1e293b; border-radius: 25px; padding: 22px; display: flex; align-items: center; gap: 20px; margin-bottom: 25px; border: 2px solid transparent; transition: 0.3s; }
        .input-mega:focus-within { border-color: var(--primary); }
        .input-mega input { background: none; border: none; color: white; flex: 1; font-size: 20px; font-weight: 700; outline: none; }

        .btn-confirm { background: linear-gradient(90deg, var(--primary), #6d28d9); color: white; border: none; padding: 25px; border-radius: 25px; width: 100%; font-size: 22px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-confirm:active { transform: scale(0.96); }

        /* TOAST NOTIFICATIONS */
        .toast-box { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: var(--surface); padding: 15px 35px; border-radius: 50px; border: 1px solid var(--primary); z-index: 11000; display: none; font-weight: 700; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <div id="titan-toast" class="toast-box animate__animated"></div>

    <div id="boot-kernel" class="boot-wrapper">
        <div class="boot-logo animate__animated animate__pulse animate__infinite">E-MAX</div>
        <div class="boot-bar-bg"><div id="boot-bar-fill"></div></div>
        <p id="boot-status" style="margin-top:20px; font-family:monospace; color:var(--accent); font-size:12px; letter-spacing:2px;">INIT_SYSTEM_CORE...</p>
    </div>

    <div id="e-max-app">
        <header class="top-nav">
            <div class="u-pill">
                <img id="u-photo" src="">
                <div>
                    <b id="u-name" style="font-size:15px; display:block;">...</b>
                    <span style="color:var(--gold); font-size:10px; font-weight:900;">TITAN FOUNDER</span>
                </div>
            </div>
            <div class="balance-trigger" onclick="CORE.ui.notify('نظام الشحن متاح قريباً في الأسكندرية')">
                <span id="u-balance">0.00</span> <small>ج.م</small>
            </div>
        </header>

        <div id="map-engine"></div>

        <div class="main-console animate__animated animate__slideInUp">
            <h2 style="margin-bottom:25px; font-weight:900;">أهلاً بك، إلى أين نذهب اليوم؟</h2>
            <div class="input-mega">
                <i class="fas fa-search-location" style="color:var(--primary); font-size:24px;"></i>
                <input type="text" id="destination-input" placeholder="حدد وجهتك في الأسكندرية...">
            </div>
            <button class="btn-confirm" onclick="CORE.trip.request()">تأكيد طلب الرحلة</button>
        </div>
    </div>

    <script>
        /* [SECTION 2: QUANTUM CORE JAVASCRIPT] */

        const FB_CONFIG = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            databaseURL: "https://e-max-d7438-default-rtdb.firebaseio.com/",
        };

        firebase.initializeApp(FB_CONFIG);
        const DB = firebase.database();
        const AUTH = firebase.auth();

        const CORE = {
            state: { user: null, data: null, map: null, location: [31.2, 29.9] },

            async init() {
                this.updateBoot(20, "CONNECTING_TO_TITAN_SERVER...");
                AUTH.onAuthStateChanged(user => {
                    if (user) {
                        this.state.user = user;
                        this.syncData();
                    } else {
                        this.updateBoot(100, "AUTHENTICATION_REQUIRED");
                        AUTH.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                    }
                });
            },

            syncData() {
                this.updateBoot(50, "SYNCING_USER_PROFILE...");
                DB.ref('users/' + this.state.user.uid).on('value', snap => {
                    this.state.data = snap.val();
                    
                    // [PATCH]: Auto-Create Profile if new
                    if (!this.state.data) {
                        this.updateBoot(60, "PROVISIONING_NEW_ACCOUNT...");
                        DB.ref('users/' + this.state.user.uid).set({
                            name: this.state.user.displayName,
                            photo: this.state.user.photoURL,
                            balance: 0,
                            created_at: Date.now()
                        });
                    } else {
                        this.refreshUI();
                        this.setupMap();
                        this.finalize();
                    }
                });
            },

            refreshUI() {
                // [FIX]: النهائي لمشكلة toFixed و toUpperCase
                const safeName = this.state.data.name ? this.state.data.name.toString() : "E-MAX USER";
                const safeBalance = Number(this.state.data.balance || 0).toFixed(2);

                document.getElementById('u-name').innerText = safeName;
                document.getElementById('u-photo').src = this.state.data.photo || "";
                document.getElementById('u-balance').innerText = safeBalance;
                
                console.log("[KERNEL]: UI Refresh Complete.");
            },

            setupMap() {
                if (this.state.map) return;
                this.updateBoot(80, "GEOSPATIAL_CALIBRATION...");
                
                this.state.map = L.map('map-engine', { zoomControl: false }).setView(this.state.location, 15);
                L.tileLayer('https://{s}.tile.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(this.state.map);
                
                navigator.geolocation.getCurrentPosition(p => {
                    this.state.location = [p.coords.latitude, p.coords.longitude];
                    this.state.map.setView(this.state.location, 15);
                    L.circleMarker(this.state.location, { radius: 10, color: '#8b5cf6', fillOpacity: 0.8 }).addTo(this.state.map);
                });
            },

            trip: {
                request() {
                    const dest = document.getElementById('destination-input').value;
                    if (!dest) return CORE.ui.notify("يرجى تحديد الوجهة");
                    
                    CORE.ui.notify("جاري البحث عن كباتن E-MAX...");
                    DB.ref('rides').push({
                        rider: CORE.state.user.uid,
                        destination: dest,
                        status: 'searching',
                        timestamp: Date.now()
                    });
                }
            },

            ui: {
                notify(msg) {
                    const t = document.getElementById('titan-toast');
                    t.innerText = msg;
                    t.style.display = 'block';
                    t.classList.add('animate__fadeInDown');
                    setTimeout(() => {
                        t.classList.replace('animate__fadeInDown', 'animate__fadeOutUp');
                        setTimeout(() => { t.style.display = 'none'; t.classList.remove('animate__fadeOutUp'); }, 500);
                    }, 3000);
                }
            },

            updateBoot(pct, msg) {
                document.getElementById('boot-bar-fill').style.width = pct + '%';
                document.getElementById('boot-status').innerText = msg;
            },

            finalize() {
                this.updateBoot(100, "TITAN_OS_ONLINE");
                setTimeout(() => {
                    document.getElementById('boot-kernel').style.display = 'none';
                    document.getElementById('e-max-app').style.display = 'flex';
                }, 1500);
            }
        };

        // EXECUTING KERNEL
        CORE.init();

        /* ================================================================================
           ADDITIONAL MODULES (TO EXPAND CODE VOLUME)
           ================================================================================
        */

        // [MODULE 10: ALEXANDRIA AREA DATABASE]
        const ALEX_ZONES = [
            "Smouha", "Sidi Gaber", "Loran", "Glym", "San Stefano", 
            "Kafr Abdo", "Victoria", "Mandara", "Miami", "Asafra"
        ];
        
        // [MODULE 11: SECURITY LOGS]
        function logSecurity() {
            console.log("%c[SECURITY]: System is protected by E-MAX SHIELD", "color:red; font-weight:bold;");
        }
        setInterval(logSecurity, 60000);

    </script>
</body>
</html>
