<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Max | Passenger</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --red: #ef4444; --green: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        .screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        #app-ui { display: none; height: 100vh; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; }
        .controls { padding: 15px; background: var(--card); border-radius: 20px 20px 0 0; position: relative; }
        .btn { width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 14px; }
        .btn-sos { background: var(--red); color: white; width: 45px; height: 45px; border-radius: 50%; position: absolute; top: -55px; left: 15px; font-size: 10px; display: flex; align-items: center; justify-content: center; border: none; }
        .v-card { background: var(--card); width: 85%; max-width: 280px; padding: 12px; border-radius: 15px; margin: 8px auto; text-align: center; border: 1px solid #334155; cursor: pointer; font-size: 14px; }
        .input-box { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 14px; }
        #wallet-screen, #offers-screen, #active-ride-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; padding: 15px; overflow-y: auto; }
        .offer-card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 10px; border-right: 4px solid var(--accent); }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <h1 style="color:var(--accent); font-size: 35px; margin-bottom: 20px;">E-MAX</h1>
        <button class="btn" style="background:#4285F4; color:white; max-width: 250px;" onclick="loginWithGoogle()">🔵 دخول بواسطة Google</button>
    </div>

    <div id="vehicle-screen" class="screen" style="display: none;">
        <h3 style="margin-bottom: 15px;">اختر نوع الرحلة 🚕</h3>
        <div class="v-card" onclick="selectVehicle('عادية')">🚕 عادية</div>
        <div class="v-card" onclick="selectVehicle('برو')">✨ برو</div>
        <div class="v-card" onclick="selectVehicle('موتوسيكل')">🏍️ موتوسيكل</div>
    </div>

    <div id="app-ui">
        <div style="padding:10px 15px; display:flex; justify-content:space-between; background:var(--card); align-items:center;">
            <div onclick="toggleWallet(true)" style="cursor:pointer; background:#0f172a; padding:5px 12px; border-radius:8px; font-size:13px;">💳 <span id="balance">0</span> ج.م</div>
            <div style="font-weight:bold; color:var(--accent); font-size:18px;">E-MAX</div>
            <div onclick="logout()" style="color:var(--red); font-size:11px;">خروج</div>
        </div>
        <div id="map"></div>
        <div class="controls">
            <button class="btn-sos" onclick="sendSOS()">SOS</button>
            <input type="text" id="dest" class="input-box" placeholder="رايح فين؟">
            <select id="pay-method" class="input-box">
                <option value="cash">💵 كاش للسائق</option>
                <option value="wallet">💳 من المحفظة</option>
            </select>
            <button class="btn" style="background:var(--accent); color:white;" onclick="requestRide()">اطلب وشوف العروض ✅</button>
        </div>
    </div>

    <div id="wallet-screen">
        <h3>المحفظة 💳</h3>
        <p style="font-size:13px; background:#1e293b; padding:10px; border-radius:10px;">حول لـ: <b style="color:var(--green)">01019930581</b></p>
        <input type="number" id="w-amt" class="input-box" placeholder="المبلغ">
        <input type="text" id="w-phone" class="input-box" placeholder="رقم المحفظة المحول منها">
        <button class="btn" style="background:var(--green); color:white;" onclick="sendWalletRequest()">تأكيد الإيداع</button>
        <button class="btn" style="background:none; color:#94a3b8" onclick="toggleWallet(false)">إغلاق</button>
    </div>

    <div id="offers-screen">
        <h3 style="text-align:center;">عروض الكباتن 📡</h3>
        <div id="offers-list"></div>
        <button class="btn" style="background:var(--red); color:white; margin-top:15px;" onclick="cancelRide()">إلغاء الطلب</button>
    </div>

    <div id="active-ride-screen">
        <div class="v-card" style="max-width:100%; cursor:default;">
            <h3 id="ride-status" style="color:var(--green)">الكابتن في الطريق!</h3>
            <h2 id="act-driver-name" style="margin:5px 0;">--</h2>
            <b id="act-price" style="font-size:26px; color:var(--green); display:block; margin:10px 0;">0 ج.م</b>
            <a id="call-btn" href="#" class="btn" style="background:var(--green); color:white; text-decoration:none; display:block; text-align:center;">📞 اتصل</a>
            <button class="btn" style="background:none; color:var(--red); border:1px solid var(--red); margin-top:10px;" onclick="cancelRide()">إلغاء الرحلة</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            authDomain: "e-max-d7438.firebaseapp.com",
            databaseURL: "https://e-max-d7438-default-rtdb.firebaseio.com/",
            projectId: "e-max-d7438",
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();
        const auth = firebase.auth();
        let userUid, currentRideId, selectedType, map;

        auth.onAuthStateChanged(user => {
            if(user) {
                userUid = user.uid;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('vehicle-screen').style.display = 'flex';
                
                // تحديث الرصيد
                rtdb.ref('users/'+userUid+'/balance').on('value', s => document.getElementById('balance').innerText = s.val() || 0);

                // 🔥 مراقبة طلبات الإيداع (التحديث التلقائي)
                rtdb.ref('deposit_requests').orderByChild('uid').equalTo(userUid).on('child_changed', snap => {
                    const req = snap.val();
                    if(req.status === 'approved' && !req.processed) {
                        rtdb.ref('users/'+userUid+'/balance').transaction(b => (b || 0) + parseInt(req.amount));
                        rtdb.ref('deposit_requests/'+snap.key).update({processed: true});
                        alert("✅ تم إضافة " + req.amount + " ج.م لرصيدك!");
                    }
                });
            }
        });

        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function selectVehicle(type) {
            selectedType = type;
            document.getElementById('vehicle-screen').style.display = 'none';
            document.getElementById('app-ui').style.display = 'flex';
            setTimeout(() => {
                map = L.map('map', {zoomControl: false}).setView([30.04, 31.23], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }, 200);
        }

        function requestRide() {
            const dest = document.getElementById('dest').value;
            const pay = document.getElementById('pay-method').value;
            if(!dest) return alert("حدد الوجهة");
            const rideRef = rtdb.ref('rides/').push();
            currentRideId = rideRef.key;
            rideRef.set({
                riderId: userUid, riderName: auth.currentUser.displayName,
                destination: dest, type: selectedType, status: 'searching',
                payMethod: pay, riderPhone: "01XXXXXXXXX"
            });
            document.getElementById('offers-screen').style.display = 'flex';
            listenToOffers();
        }

        function listenToOffers() {
            rtdb.ref('offers/' + currentRideId).on('child_added', snap => {
                const o = snap.val();
                const div = document.createElement('div');
                div.className = 'offer-card';
                div.innerHTML = `<b>🚕 ${o.driverName}</b><br><small>${o.price} ج.م | ${o.arrivalTime} د</small><br>
                <button class="btn" style="background:var(--accent); color:white;" onclick="confirmOffer('${snap.key}','${o.driverName}','${o.price}','${o.driverPhone}')">قبول</button>`;
                document.getElementById('offers-list').appendChild(div);
            });
            rtdb.ref('rides/'+currentRideId+'/status').on('value', s => { if(s.val()==='completed') location.reload(); });
        }

        function confirmOffer(dId, dName, price, phone) {
            rtdb.ref('rides/' + currentRideId).update({status: 'accepted', driverId: dId, finalPrice: price, driverPhone: phone});
            document.getElementById('offers-screen').style.display = 'none';
            document.getElementById('active-ride-screen').style.display = 'flex';
            document.getElementById('act-driver-name').innerText = dName;
            document.getElementById('act-price').innerText = price + " ج.م";
            document.getElementById('call-btn').href = "tel:" + phone;
        }

        function sendWalletRequest() {
            const amt = document.getElementById('w-amt').value;
            if(!amt) return;
            rtdb.ref('deposit_requests').push({uid: userUid, amount: amt, status: 'pending', processed: false});
            alert("تم إرسال الطلب!"); toggleWallet(false);
        }

        function cancelRide() { rtdb.ref('rides/' + currentRideId).update({status: 'cancelled'}).then(()=>location.reload()); }
        function sendSOS() { rtdb.ref('sos').push({uid: userUid, time: Date.now()}); alert("تم إرسال SOS!"); }
        function toggleWallet(s) { document.getElementById('wallet-screen').style.display = s ? 'flex' : 'none'; }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
