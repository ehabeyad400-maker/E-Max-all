<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Max | النسخة النهائية 🚀</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --green: #10b981; --red: #ef4444; --yellow: #f59e0b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* شاشات كاملة */
        .full-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; transition: 0.5s; }
        .card { background: var(--card); padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }

        #app-ui { display: none; flex-direction: column; height: 100vh; }
        header { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        #map { flex-grow: 1; z-index: 1; }

        /* التحكم والبحث */
        .controls { position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 20px; border-radius: 30px 30px 0 0; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.4); }
        .input-box { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; outline: none; }
        
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 5px; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sos { background: var(--red); color: white; width: 50px; height: 50px; border-radius: 50%; position: fixed; top: 80px; left: 20px; z-index: 500; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* شات السائق */
        #chat-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 50vh; background: var(--card); z-index: 2000; transition: 0.4s; border-radius: 30px 30px 0 0; display: flex; flex-direction: column; }
        #chat-panel.active { bottom: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .msg.me { background: var(--accent); align-self: flex-start; }
        .msg.driver { background: #334155; align-self: flex-end; }
    </style>
</head>
<body>

    <div id="auth-screen" class="full-screen">
        <div class="card">
            <h1 style="color: var(--accent); margin-bottom: 5px;">E-MAX</h1>
            <p style="color: #94a3b8; margin-bottom: 30px;">أسرع طريقة للتنقل في مصر</p>
            <button class="btn btn-main" style="background: white; color: #000;" onclick="loginWithGoogle()">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="18" style="vertical-align: middle; margin-left: 8px;">
                الدخول بحساب Google
            </button>
        </div>
    </div>

    <div id="wallet-page" class="full-screen" style="display:none; z-index: 11000;">
        <div class="card">
            <h3 style="color: var(--green);">شحن المحفظة 💳</h3>
            <p style="font-size: 14px;">حول المبلغ على الرقم التالي:</p>
            <div style="background:#0f172a; padding:15px; border-radius:15px; margin-bottom:15px; cursor:pointer;" onclick="copyNumber()">
                <b id="vodafone-num" style="font-size: 20px; color: var(--green);">01012345678</b>
                <div style="font-size:10px; color:#64748b;">(اضغط للنسخ)</div>
            </div>
            <input type="number" id="cash-amt" class="input-box" placeholder="المبلغ المحول (ج.م)">
            <input type="text" id="cash-phone" class="input-box" placeholder="الرقم الذي حولت منه">
            <button class="btn btn-main" onclick="sendDeposit()">إرسال الطلب للأدمن</button>
            <button class="btn" style="background:none;" onclick="closeWallet()">رجوع</button>
        </div>
    </div>

    <div id="app-ui">
        <header>
            <div onclick="openWallet()" style="background:var(--green); padding:8px 15px; border-radius:12px; cursor:pointer; font-size:14px;">
                💰 <span id="balance">0</span> ج.م
            </div>
            <div style="font-weight:bold; letter-spacing: 2px;">E-MAX</div>
            <div onclick="logout()" style="color:var(--red); cursor:pointer;">خروج</div>
        </header>

        <div id="map"></div>

        <div class="btn-sos" onclick="sendSOS()">SOS</div>

        <div class="controls">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button class="btn" style="background:#334155; font-size:12px;" onclick="setDest('البيت')">🏠 البيت</button>
                <button class="btn" style="background:#334155; font-size:12px;" onclick="setDest('العمل')">💼 العمل</button>
            </div>
            <input type="text" id="dest-input" class="input-box" placeholder="رايح فين النهاردة؟">
            <button class="btn btn-main" id="order-btn" onclick="requestRide()">تأكيد الطلب ✅</button>
            <button id="chat-btn" class="btn" style="background:var(--yellow); color:black; display:none;" onclick="toggleChat()">💬 مراسلة السائق</button>
        </div>
    </div>

    <div id="chat-panel">
        <div style="padding:15px; border-bottom:1px solid #334155; display:flex; justify-content:space-between;">
            <b>المحادثة مع السائق</b>
            <button onclick="toggleChat()" style="background:none; border:none; color:white;">✖</button>
        </div>
        <div id="messages"></div>
        <div style="padding:15px; display:flex; gap:10px;">
            <input type="text" id="msg-val" class="input-box" placeholder="اكتب رسالة..." style="margin-bottom:0;">
            <button class="btn btn-main" style="width:70px; margin:0;" onclick="sendMsg()">ارسل</button>
        </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            databaseURL: "https://e-max-d7438-default-rtdb.firebaseio.com/",
            projectId: "e-max-d7438",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const rtdb = firebase.database();

        let map, userMarker, userUid, currentRideId = null;
        let driverMarkers = {};

        // 1. نظام الدخول والحالة
        auth.onAuthStateChanged(user => {
            if(user) {
                userUid = user.uid;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-ui').style.display = 'flex';
                initMap();
                listenToBalance();
            }
        });

        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function listenToBalance() {
            rtdb.ref('users/' + userUid + '/balance').on('value', s => {
                document.getElementById('balance').innerText = s.val() || 0;
            });
        }

        // 2. المحفظة والنسخ
        function openWallet() { document.getElementById('wallet-page').style.display = 'flex'; }
        function closeWallet() { document.getElementById('wallet-page').style.display = 'none'; }
        function copyNumber() {
            navigator.clipboard.writeText("01012345678");
            alert("تم نسخ الرقم!");
        }

        function sendDeposit() {
            const amt = document.getElementById('cash-amt').value;
            const phone = document.getElementById('cash-phone').value;
            if(!amt || !phone) return alert("البيانات ناقصة!");
            rtdb.ref('deposit_requests').push({ uid: userUid, amount: amt, from: phone, status: 'pending' });
            alert("طلبك وصل للأدمن، الرصيد هيزيد خلال دقايق!");
            closeWallet();
        }

        // 3. الخريطة وتتبع السواقين الحقيقيين
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([30.0444, 31.2357], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude, lng = p.coords.longitude;
                map.setView([lat, lng], 16);
                userMarker = L.marker([lat, lng]).addTo(map).bindPopup("موقعك").openPopup();
                
                // تحديث موقع الراكب في السيرفر (اختياري)
                rtdb.ref('active_riders/' + userUid).set({ lat, lng });
            });

            // جلب السواقين "اللايف" من الـ Database
            rtdb.ref('drivers_online').on('value', snap => {
                const drivers = snap.val();
                for (let id in drivers) {
                    const d = drivers[id];
                    if (driverMarkers[id]) {
                        driverMarkers[id].setLatLng([d.lat, d.lng]);
                    } else {
                        driverMarkers[id] = L.marker([d.lat, d.lng], {
                            icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png', iconSize: [30, 30] })
                        }).addTo(map);
                    }
                }
            });
        }

        // 4. طلب الرحلة والشات
        function requestRide() {
            const d = document.getElementById('dest-input').value;
            if(!d) return alert("اكتب رايح فين!");
            
            const rideRef = rtdb.ref('rides/').push();
            currentRideId = rideRef.key;
            rideRef.set({ riderId: userUid, to: d, status: 'searching' });
            
            document.getElementById('order-btn').innerText = "جاري البحث عن سائق...";
            document.getElementById('chat-btn').style.display = 'block';
            listenToChat();
        }

        function sendSOS() {
            if(!userMarker) return;
            const loc = userMarker.getLatLng();
            rtdb.ref('emergency_alerts').push({ uid: userUid, lat: loc.lat, lng: loc.lng, time: Date.now() });
            alert("تم إرسال نداء استغاثة للأدمن بموقعك الحالي!");
        }

        function toggleChat() { document.getElementById('chat-panel').classList.toggle('active'); }
        
        function sendMsg() {
            const txt = document.getElementById('msg-val').value;
            if(!txt || !currentRideId) return;
            rtdb.ref('chats/' + currentRideId).push({ sender: 'rider', text: txt });
            document.getElementById('msg-val').value = "";
        }

        function listenToChat() {
            rtdb.ref('chats/' + currentRideId).on('child_added', snap => {
                const m = snap.val();
                const div = document.createElement('div');
                div.className = m.sender === 'rider' ? 'msg me' : 'msg driver';
                div.innerText = m.text;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = 9999;
            });
        }

        function setDest(place) { document.getElementById('dest-input').value = place; }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
