<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-MAX | تطبيق الراكب</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script> // في كود الراكب عند طلب الرحلة
rtdb.ref('rides').push({
    riderId: userUid,
    riderName: userName,
    destination: destinationText, // الوجهة اللي كتبها أو حددها
    riderLoc: { lat: currentLat, lng: currentLng }, // موقعه الحالي
    status: 'searching'
}); </script>
    
    <style>
        :root { --main: #3b82f6; --dark: #0f172a; --card: #1e293b; --text: #f8fafc; --green: #10b981; --red: #ef4444; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; background: var(--dark); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* شاشة الدخول */
        #auth-screen { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .login-box { background: var(--card); padding: 40px; border-radius: 25px; border: 1px solid #334155; width: 90%; max-width: 400px; }
        
        /* الواجهة الرئيسية */
        #app-ui { display: none; flex-direction: column; height: 100vh; }
        #map { flex: 1; width: 100%; z-index: 1; }
        
        /* شريط المعلومات العلوي */
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        .balance-chip { background: #0f172a; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--main); color: var(--green); font-weight: bold; }

        /* لوحة التحكم السفلية */
        .bottom-sheet { background: var(--card); padding: 20px; border-radius: 30px 30px 0 0; position: relative; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-main { background: var(--main); color: white; }
        .btn-main:active { transform: scale(0.98); }

        /* حالة البحث */
        #searching-ui { display: none; text-align: center; padding: 20px; }
        .loader { width: 50px; height: 50px; border: 5px solid #334155; border-top-color: var(--main); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* الشات */
        #chat-box { position: fixed; bottom: 0; left: 0; right: 0; height: 60vh; background: var(--card); z-index: 2000; display: none; flex-direction: column; padding: 20px; border-radius: 25px 25px 0 0; }
        #messages { flex: 1; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .msg.me { background: var(--main); align-self: flex-start; }
        .msg.them { background: #334155; align-self: flex-end; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-box">
            <h1 style="color: var(--main); font-size: 40px; margin: 0;">E-MAX</h1>
            <p style="color: #94a3b8;">أهلاً بك في مستقبل المواصلات</p>
            <button class="btn btn-main" onclick="loginWithGoogle()">تسجيل دخول بواسطة Google 🚀</button>
        </div>
    </div>

    <div id="app-ui">
        <header>
            <div class="balance-chip">💳 <span id="user-balance">0</span> ج.م</div>
            <div style="font-weight: bold; color: var(--main);">E-MAX</div>
            <button onclick="logout()" style="background:none; border:none; color:var(--red); font-weight:bold;">خروج</button>
        </header>

        <div id="map"></div>

        <div class="bottom-sheet" id="order-sheet">
            <input type="tel" id="p-phone" placeholder="رقم الموبايل (مثلاً 01123456789)" maxlength="11">
            <div id="dest-info" style="margin: 10px 0; color: var(--main); font-size: 14px; text-align: center;">
                📍 من فضلك حدد وجهتك بالضغط على الخريطة
            </div>
            <select id="payment-type">
                <option value="cash">كاش للسائق 💵</option>
                <option value="wallet">خصم من المحفظة 💳</option>
            </select>
            <button class="btn btn-main" onclick="startRideRequest()">اطلب الآن ✅</button>
        </div>

        <div class="bottom-sheet" id="searching-ui">
            <div class="loader"></div>
            <h3>جاري البحث عن أقرب كابتن...</h3>
            <p style="color: #94a3b8;">يرجى الانتظار قليلاً</p>
            <button class="btn" style="background: var(--red); color: white;" onclick="cancelRide()">إلغاء الطلب</button>
        </div>
    </div>

    <div id="chat-box">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <b>المحادثة مع الكابتن</b>
            <button onclick="closeChat()" style="background:none; border:none; color:var(--red); font-size:20px;">×</button>
        </div>
        <div id="messages"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="chat-input" placeholder="اكتب رسالة...">
            <button class="btn btn-main" style="width: 80px;" onclick="sendChatMessage()">إرسال</button>
        </div>
    </div>

    <script>
        // التكوين
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            databaseURL: "https://e-max-d7438-default-rtdb.firebaseio.com/",
            projectId: "e-max-d7438",
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();
        const auth = firebase.auth();

        let map, userUid, userName, myLoc, destLoc, destMarker, currentRideId;

        // 1. نظام الحماية والدخول
        auth.onAuthStateChanged(user => {
            if (user) {
                userUid = user.uid;
                userName = user.displayName;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-ui').style.display = 'flex';
                initMap();
                loadUserData();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        function loginWithGoogle() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }

        function logout() { auth.signOut(); location.reload(); }

        // 2. إدارة الخرائط والموقع
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([31.2001, 29.9187], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // تحديد موقع الراكب لايف
            navigator.geolocation.watchPosition(p => {
                myLoc = { lat: p.coords.latitude, lng: p.coords.longitude };
                map.setView([myLoc.lat, myLoc.lng], 15);
                L.marker([myLoc.lat, myLoc.lng]).addTo(map).bindPopup("أنت هنا").openPopup();
            }, null, { enableHighAccuracy: true });

            // اختيار الوجهة باللمس
            map.on('click', e => {
                destLoc = e.latlng;
                if(destMarker) map.removeLayer(destMarker);
                destMarker = L.marker(destLoc, { 
                    icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2776/2776067.png', iconSize: [35, 35] }) 
                }).addTo(map);
                document.getElementById('dest-info').innerHTML = "<b>✅ تم تحديد الوجهة بنجاح</b>";
                document.getElementById('dest-info').style.color = "#10b981";
            });
        }

        // 3. نظام طلب الرحلة والتحقق
        function startRideRequest() {
            const phone = document.getElementById('p-phone').value;
            const pay = document.getElementById('payment-type').value;
            const phoneRegex = /^01[0125][0-9]{8}$/;

            if (!phoneRegex.test(phone)) return alert("خطأ: يرجى إدخال رقم موبايل مصري صحيح (11 رقم)");
            if (!destLoc) return alert("خطأ: يرجى تحديد وجهتك على الخريطة أولاً");

            // التحقق من الرصيد لو اختار محفظة
            const balance = parseInt(document.getElementById('user-balance').innerText);
            if(pay === 'wallet' && balance < 20) return alert("عذراً: رصيد محفظتك غير كافٍ (أقل من 20 ج.م)");

            // إرسال الطلب للـ Firebase
            const rideRef = rtdb.ref('rides').push();
            currentRideId = rideRef.key;

            const rideData = {
                id: currentRideId,
                riderName: userName,
                riderPhone: phone,
                riderUid: userUid,
                pickup: myLoc,
                destination: { lat: destLoc.lat, lng: destLoc.lng },
                status: 'searching',
                payment: pay,
                timestamp: Date.now()
            };

            rideRef.set(rideData).then(() => {
                document.getElementById('order-sheet').style.display = 'none';
                document.getElementById('searching-ui').style.display = 'block';
                listenToRideUpdates();
            });
        }

        function listenToRideUpdates() {
            rtdb.ref('rides/' + currentRideId).on('value', snap => {
                const r = snap.val();
                if(!r) return;

                if(r.status === 'accepted') {
                    alert("تم قبول الرحلة! الكابتن في الطريق إليك.");
                    document.getElementById('searching-ui').innerHTML = `
                        <h2 style="color:var(--green)">الكابتن قادم!</h2>
                        <button class="btn btn-main" onclick="openChat()">💬 فتح المحادثة</button>
                    `;
                    listenToChat();
                }
                
                if(r.status === 'completed') {
                    alert("وصلنا بالسلامة! شكراً لاستخدامك E-MAX.");
                    location.reload();
                }
            });
        }

        // 4. المحفظة والبيانات
        function loadUserData() {
            rtdb.ref('users/' + userUid + '/balance').on('value', s => {
                document.getElementById('user-balance').innerText = s.val() || 0;
            });
        }

        // 5. نظام الشات
        function openChat() { document.getElementById('chat-box').style.display = 'flex'; }
        function closeChat() { document.getElementById('chat-box').style.display = 'none'; }

        function sendChatMessage() {
            const txt = document.getElementById('chat-input').value;
            if(!txt) return;
            rtdb.ref('chats/' + currentRideId).push({ sender: 'rider', text: txt, time: Date.now() });
            document.getElementById('chat-input').value = "";
        }

        function listenToChat() {
            rtdb.ref('chats/' + currentRideId).on('child_added', snap => {
                const m = snap.val();
                const div = document.createElement('div');
                div.className = m.sender === 'rider' ? 'msg me' : 'msg them';
                div.innerText = m.text;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            });
        }

        function cancelRide() {
            if(confirm("هل أنت متأكد من إلغاء الطلب؟")) {
                rtdb.ref('rides/' + currentRideId).remove();
                location.reload();
            }
        }
    </script>
</body>
</html>
