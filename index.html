<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Max | Passenger Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --bg: #0b0f19; --card: #161c2d; --accent: #3b82f6; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* الهيدر */
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid #2d3748; }
        .icon-btn { cursor: pointer; font-size: 20px; background: none; border: none; color: white; }

        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: var(--card); padding: 30px; border-radius: 25px; text-align: center; width: 85%; max-width: 380px; border: 1px solid #2d3748; }
        .btn-google { background: white; color: black; padding: 12px; width: 100%; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }

        /* الخريطة */
        #map { flex-grow: 1; width: 100%; }

        /* القائمة الجانبية (Settings) */
        #settings-panel { position: fixed; right: -300px; top: 0; width: 280px; height: 100%; background: var(--card); z-index: 2000; transition: 0.3s; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        #settings-panel.active { right: 0; }
        .profile-img { width: 70px; height: 70px; background: var(--accent); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; }

        /* نافذة المحفظة */
        #wallet-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .pay-method { background: #1f2937; padding: 15px; margin: 10px 0; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #374151; }
        .pay-method:hover { border-color: var(--accent); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>E-Max</h2>
            <button class="btn-google" onclick="loginWithGoogle()">
                <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" width="20">
                تسجيل دخول سريع
            </button>
        </div>
    </div>

    <div id="main-app" style="display:none; height: 100vh; flex-direction: column;">
        <header>
            <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
            <div style="font-weight: bold;">E-MAX</div>
            <button class="icon-btn" onclick="openWallet()">💰 <span id="u-bal">0</span></button>
        </header>
        
        <div id="map"></div>
    </div>

    <div id="settings-panel">
        <button class="icon-btn" onclick="toggleSettings()">✖</button>
        <div class="profile-img">👤</div>
        <h3 id="p-name">الاسم</h3>
        <p id="p-email" style="color: #94a3b8; font-size: 14px;">الإيميل</p>
        <p id="p-phone" style="color: #94a3b8; font-size: 14px;">01xxxxxxxxx</p>
        <hr style="border: 0.5px solid #2d3748; margin: 20px 0;">
        <button onclick="logout()" style="color: #ef4444; background: none; border: none; cursor: pointer;">تسجيل الخروج</button>
    </div>

    <div id="wallet-modal">
        <div class="modal-content">
            <h3>شحن المحفظة</h3>
            <div class="pay-method" onclick="alert('سوف يتم التحويل لـ فودافون كاش')">
                <span>فودافون كاش</span> <span>📱</span>
            </div>
            <div class="pay-method" onclick="alert('سوف يتم فتح بوابة الفيزا')">
                <span>بطاقة بنكية (Visa)</span> <span>💳</span>
            </div>
            <div class="pay-method" onclick="alert('كود شحن فورى: 12345')">
                <span>فوري</span> <span>🏪</span>
            </div>
            <button onclick="closeWallet()" style="margin-top: 15px; background: none; border: 1px solid white; color: white; padding: 10px 20px; border-radius: 10px;">إغلاق</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            authDomain: "e-max-d7438.firebaseapp.com",
            projectId: "e-max-d7438",
            storageBucket: "e-max-d7438.firebasestorage.app",
            messagingSenderId: "394379576685",
            appId: "1:394379576685:web:a2ffe30d4132b5a62c4664"
        };
        firebase.initializeApp(firebaseConfig);

        let map, userMarker;

        // 1. فحص الجلسة (عشان يفضل حافظ الدخول)
        window.onload = () => {
            const savedUser = localStorage.getItem('emax_user');
            if (savedUser) {
                launchApp(JSON.parse(savedUser));
            }
        };

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((res) => {
                const userData = {
                    name: res.user.displayName,
                    email: res.user.email,
                    phone: res.user.phoneNumber || "لم يتم الربط",
                    balance: 0
                };
                localStorage.setItem('emax_user', JSON.stringify(userData));
                launchApp(userData);
            }).catch(err => alert(err.message));
        }

        function launchApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            
            // تحديث بيانات البروفايل
            document.getElementById('u-bal').innerText = user.balance;
            document.getElementById('p-name').innerText = user.name;
            document.getElementById('p-email').innerText = user.email;
            document.getElementById('p-phone').innerText = user.phone;

            initMap();
        }

        // 2. تحديد الموقع التلقائي
        function initMap() {
            map = L.map('map').setView([30.0444, 31.2357], 15); // القاهرة كبداية
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    
                    if (!userMarker) {
                        userMarker = L.marker([lat, lng]).addTo(map).bindPopup("أنت هنا").openPopup();
                        map.setView([lat, lng], 16);
                    } else {
                        userMarker.setLatLng([lat, lng]);
                    }
                }, (err) => console.log("خطأ في تحديد الموقع"), { enableHighAccuracy: true });
            }
        }

        // 3. التحكم في الواجهة
        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('active');
        }

        function openWallet() { document.getElementById('wallet-modal').style.display = 'flex'; }
        function closeWallet() { document.getElementById('wallet-modal').style.display = 'none'; }

        function logout() {
            localStorage.removeItem('emax_user');
            location.reload();
        }
    </script>
</body>
</html>
