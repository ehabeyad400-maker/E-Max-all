<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Max | Passenger</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #161c2d; --accent: #3b82f6; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: var(--card); padding: 30px; border-radius: 25px; text-align: center; width: 85%; max-width: 380px; border: 1px solid #2d3748; }
        .logo { font-size: 35px; font-weight: bold; margin-bottom: 20px; }
        .logo span { color: var(--accent); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #2d3748; background: #0b0f19; color: white; box-sizing: border-box; outline: none; }
        .btn { background: var(--accent); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-google { background: white; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #main-app { display: none; flex-grow: 1; flex-direction: column; }
        header { background: rgba(22, 28, 45, 0.9); padding: 15px; display: flex; justify-content: space-between; z-index: 1001; }
        #map { flex-grow: 1; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <div class="logo">E-<span>Max</span></div>
            <button class="btn btn-google" onclick="loginWithGoogle()">
                <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" width="20">
                الدخول بواسطة جوجل
            </button>
            <div style="margin: 15px 0; color: #4b5563;">أو سجل يدوياً</div>
            <input type="text" id="reg-name" placeholder="الاسم">
            <input type="tel" id="reg-phone" placeholder="رقم الموبايل">
            <input type="password" id="reg-pass" placeholder="كلمة المرور">
            <button class="btn" onclick="handleManualLogin()">دخول / تسجيل</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div id="u-name">تحميل...</div>
            <div style="background:var(--accent); padding:2px 10px; border-radius:15px;">💰 <span id="u-bal">0</span></div>
        </header>
        <div id="map"></div>
    </div>

    <script>
        // بيانات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            authDomain: "e-max-d7438.firebaseapp.com",
            projectId: "e-max-d7438",
            storageBucket: "e-max-d7438.firebasestorage.app",
            messagingSenderId: "394379576685",
            appId: "1:394379576685:web:a2ffe30d4132b5a62c4664",
            measurementId: "G-MRQTSC468P"
        };

        // البدء
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const rtdb = firebase.database();

        // وظيفة دخول جوجل (تأكد من مطابقة الاسم)
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => {
                completeLogin({ name: res.user.displayName, balance: 0 });
            }).catch(err => {
                console.error(err);
                alert("خطأ: " + err.message);
            });
        }

        function handleManualLogin() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const pass = document.getElementById('reg-pass').value;
            if(!name || !phone || !pass) return alert("اكمل البيانات");
            
            rtdb.ref('passengers/'+phone).once('value', s => {
                const userData = s.exists() ? s.val() : {name, phone, password: pass, balance: 0};
                if(!s.exists()) rtdb.ref('passengers/'+phone).set(userData);
                completeLogin(userData);
            });
        }

        function completeLogin(data) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('u-name').innerText = data.name;
            document.getElementById('u-bal').innerText = data.balance;
            setTimeout(() => {
                const map = L.map('map').setView([31.2, 29.9], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }, 500);
        }
    </script>
</body>
</html>
