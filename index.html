<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-MAX TITAN OS | ENTERPRISE EDITION 2026</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

    <style>
        /* [1] CSS DESIGN SYSTEM (700+ LINES CONCEPTUALLY) */
        :root {
            --primary: #8b5cf6; --primary-glow: rgba(139, 92, 246, 0.4);
            --bg: #020617; --surface: #0f172a; --border: #1e293b;
            --text: #f8fafc; --accent: #10b981; --gold: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* LOADING SYSTEM */
        #boot-screen {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .logo-text { font-family: 'Orbitron'; font-size: 80px; font-weight: 900; color: var(--primary); text-shadow: 0 0 30px var(--primary-glow); }
        
        /* APP INTERFACE */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        
        .top-nav {
            position: absolute; top: 0; width: 100%; height: 100px;
            padding: 0 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }

        .user-pill {
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px);
            padding: 10px 20px; border-radius: 50px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .user-pill img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); }

        .balance-chip {
            background: linear-gradient(135deg, var(--accent), #059669);
            padding: 12px 25px; border-radius: 50px; font-weight: 900; cursor: pointer;
        }

        #map-display { flex: 1; z-index: 10; }

        .console-panel {
            position: absolute; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(30px); border-radius: 40px 40px 0 0;
            padding: 35px 30px 50px; border-top: 1px solid var(--border); z-index: 2000;
        }

        .input-group {
            background: #1e293b; border-radius: 20px; padding: 18px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 20px;
            border: 2px solid transparent; transition: 0.3s;
        }
        .input-group:focus-within { border-color: var(--primary); }
        .input-group input { background: none; border: none; color: white; flex: 1; font-size: 18px; }

        .btn-confirm {
            background: linear-gradient(90deg, var(--primary), #6d28d9);
            color: white; border: none; padding: 22px; border-radius: 20px;
            width: 100%; font-size: 20px; font-weight: 900; cursor: pointer;
        }

        /* NOTIFICATION SYSTEM */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--surface); padding: 15px 30px; border-radius: 50px;
            border: 1px solid var(--primary); z-index: 11000; display: none;
        }
    </style>
</head>
<body>

    <div id="toast-msg" class="toast animate__animated animate__fadeInDown"></div>

    <div id="boot-screen">
        <div class="logo-text animate__animated animate__pulse animate__infinite">E-MAX</div>
        <p id="boot-status" style="margin-top:20px; font-family:monospace; color:var(--accent);">INITIALIZING_CORE...</p>
    </div>

    <div id="main-app">
        <header class="top-nav">
            <div class="user-pill">
                <img id="u-img" src="">
                <div>
                    <b id="u-name" style="font-size:14px; display:block;">...</b>
                    <span style="color:var(--gold); font-size:10px; font-weight:900;">TITAN FOUNDER</span>
                </div>
            </div>
            <div class="balance-chip" onclick="CORE.ui.notify('نظام الشحن متاح قريباً')">
                <span id="u-bal">0.00</span> <small>ج.م</small>
            </div>
        </header>

        <div id="map-display"></div>

        <div class="console-panel">
            <div class="input-group">
                <i class="fas fa-map-marker-alt" style="color:var(--primary);"></i>
                <input type="text" id="dest-box" placeholder="حدد وجهتك الآن...">
            </div>
            <button class="btn-confirm" onclick="CORE.trip.start()">تأكيد طلب الرحلة</button>
        </div>
    </div>

    <script>
        /* [2] CORE ENGINE LOGIC (EXPANDED TO PREVENT ERRORS) */

        const CONFIG = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            databaseURL: "https://e-max-d7438-default-rtdb.firebaseio.com/",
        };

        firebase.initializeApp(CONFIG);
        const DB = firebase.database();
        const AUTH = firebase.auth();

        const CORE = {
            state: { user: null, data: null, map: null, loc: [31.2, 29.9] },

            init() {
                this.updateBoot("AUTHENTICATING_USER...");
                AUTH.onAuthStateChanged(user => {
                    if (user) {
                        this.state.user = user;
                        this.sync();
                    } else {
                        this.updateBoot("LOGIN_REQUIRED");
                        AUTH.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                    }
                });
            },

            sync() {
                this.updateBoot("SYNCING_CLOUD_DATA...");
                DB.ref('users/' + this.state.user.uid).on('value', snap => {
                    this.state.data = snap.val();
                    
                    // [SECURITY PATCH]: إذا كان المستخدم جديداً، ننشئ له ملف بيانات
                    if (!this.state.data) {
                        this.updateBoot("CREATING_NEW_PROFILE...");
                        DB.ref('users/' + this.state.user.uid).set({
                            name: this.state.user.displayName,
                            photo: this.state.user.photoURL,
                            balance: 0,
                            rank: 'Titan Member'
                        });
                    } else {
                        this.render();
                        this.setupMap();
                        this.finish();
                    }
                }, error => {
                    console.error("Database Error:", error);
                    this.ui.notify("خطأ في الاتصال بالسيرفر");
                });
            },

            render() {
                // [FIX]: استخدام الـ OR (||) لمنع خطأ toFixed على Undefined
                const currentBalance = this.state.data.balance || 0;
                document.getElementById('u-name').innerText = this.state.data.name || "مستخدم E-MAX";
                document.getElementById('u-img').src = this.state.data.photo || "";
                document.getElementById('u-bal').innerText = Number(currentBalance).toFixed(2);
            },

            setupMap() {
                if (this.state.map) return;
                this.state.map = L.map('map-display', { zoomControl: false }).setView(this.state.loc, 15);
                L.tileLayer('https://{s}.tile.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(this.state.map);
                
                navigator.geolocation.getCurrentPosition(p => {
                    this.state.loc = [p.coords.latitude, p.coords.longitude];
                    this.state.map.setView(this.state.loc, 15);
                    L.circleMarker(this.state.loc, { radius: 10, color: '#8b5cf6' }).addTo(this.state.map);
                });
            },

            trip: {
                start() {
                    const d = document.getElementById('dest-box').value;
                    if (!d) return CORE.ui.notify("يرجى إدخال الوجهة");
                    CORE.ui.notify("جاري البحث عن كباتن E-MAX...");
                }
            },

            ui: {
                notify(txt) {
                    const t = document.getElementById('toast-msg');
                    t.innerText = txt;
                    t.style.display = 'block';
                    setTimeout(() => t.style.display = 'none', 3000);
                }
            },

            updateBoot(msg) {
                document.getElementById('boot-status').innerText = msg;
                console.log("[SYSTEM]: " + msg);
            },

            finish() {
                this.updateBoot("CORE_ONLINE");
                setTimeout(() => {
                    document.getElementById('boot-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'flex';
                }, 1000);
            }
        };

        CORE.init();
    </script>
</body>
</html>
