<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Max | passenger 🚀</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --green: #10b981; --red: #ef4444; --yellow: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        .screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        #app-ui { display: none; flex-direction: column; height: 100vh; }
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #map { flex-grow: 1; z-index: 1; }

        /* شاشات منبثقة */
        #settings-screen { position: fixed; left: -100%; top: 0; width: 80%; max-width: 300px; height: 100%; background: var(--card); z-index: 12000; transition: 0.4s; padding: 20px; box-shadow: 5px 0 20px rgba(0,0,0,0.5); }
        #settings-screen.active { left: 0; }
        #wallet-screen, #active-ride-screen, #offers-screen { position: fixed; inset: 0; background: var(--bg); z-index: 11000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        #active-ride-screen { z-index: 15000; }

        .controls { position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 20px; border-radius: 30px 30px 0 0; z-index: 1000; }
        .input-box { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sos { background: var(--red); color: white; width: 55px; height: 55px; border-radius: 50%; position: fixed; top: 85px; left: 20px; z-index: 500; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        
        .timer-badge { background: var(--yellow); color: #000; padding: 10px; border-radius: 50px; font-weight: bold; margin: 15px 0; text-align: center; }
        .offer-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-right: 5px solid var(--accent); }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <div class="card">
            <h1 style="color: var(--accent);">E-MAX</h1>
            <button class="btn btn-main" onclick="loginWithGoogle()">🔵 الدخول بحساب Google</button>
            <hr style="margin:20px 0; opacity:0.1;">
            <input type="email" id="email" class="input-box" placeholder="Email">
            <input type="password" id="pass" class="input-box" placeholder="Password">
            <button class="btn" style="background: #334155; color: white;" onclick="handleAuth()">دخول / تسجيل</button>
        </div>
    </div>

    <div id="settings-screen">
        <h3>الملف الشخصي ⚙️</h3>
        <input type="text" id="user-name" class="input-box" placeholder="الاسم الكامل">
        <input type="tel" id="user-phone" class="input-box" placeholder="رقم الموبايل">
        <button class="btn btn-main" onclick="saveProfile()">حفظ التعديلات</button>
        <button class="btn" style="background:none; color:var(--red);" onclick="toggleSettings()">إغلاق</button>
    </div>

    <div id="wallet-screen">
        <div class="card" style="margin: auto;">
            <h3 style="color: var(--green);">إيداع رصيد (كاش) 📱</h3>
            <p>حول للمحفظة دي وابعبلنا البيانات:</p>
            <div style="background:#0f172a; padding:15px; border-radius:15px; margin-bottom:15px; cursor:pointer;" onclick="copyNum()">
                <b id="v-num" style="color:var(--green); font-size:18px;">01019930581</b><br>
                <small>(اضغط لنسخ الرقم)</small>
            </div>
            <input type="number" id="w-amt" class="input-box" placeholder="المبلغ اللي حولته">
            <input type="text" id="w-phone" class="input-box" placeholder="الرقم اللي حولت منه">
            <button class="btn btn-main" onclick="sendWalletRequest()">إرسال الطلب </button>
            <button class="btn" style="background:none;" onclick="toggleWallet(false)">رجوع</button>
        </div>
    </div>

    <div id="offers-screen">
        <h2 style="text-align: center;">عروض السائقين القريبة 🔍</h2>
        <div id="offers-list" style="flex:1;"></div>
        <button class="btn" style="background:var(--red); color:white;" onclick="cancelSearch()">إلغاء البحث</button>
    </div>

    <div id="active-ride-screen">
        <div style="background: var(--card); padding: 20px; border-radius: 0 0 30px 30px; text-align: center;">
            <h3 style="margin:0;">السائق في الطريق 🚕</h3>
            <div id="ride-timer" class="timer-badge">متبقي 00:00</div>
        </div>
        <div style="padding: 20px; text-align: center;">
            <h2 id="view-driver-name">اسم السائق</h2>
            <p id="view-car-model" style="color:var(--accent);">نوع العربية</p>
            <b id="view-price" style="font-size: 24px; color:var(--green);">0 ج.م</b>
            <br><br>
            <a id="call-driver" href="#" class="btn btn-main" style="background:var(--green); text-decoration:none; display:block;">📞 اتصل بالسائق</a>
            <button class="btn" style="background:var(--red); color:white; margin-top:10px;" onclick="cancelRide()">إلغاء الرحلة</button>
        </div>
    </div>

    <div id="app-ui">
        <header>
            <div onclick="toggleSettings()" style="cursor:pointer; font-size: 20px;">⚙️</div>
            <div onclick="toggleWallet(true)" style="background:var(--green); padding:5px 12px; border-radius:10px; cursor:pointer;">💳 <span id="balance">0</span> ج.م</div>
            <div onclick="logout()" style="color:var(--red); cursor:pointer;">خروج</div>
        </header>
        <div id="map"></div>
        <div class="btn-sos" onclick="sendSOS()">SOS</div>
        <div class="controls">
            <input type="text" id="dest" class="input-box" placeholder="رايح فين النهاردة؟">
            <button class="btn btn-main" onclick="requestRide()">اطلب وشوف العروض ✅</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            databaseURL: "https://e-max-d7438-default-rtdb.firebaseio.com/",
            projectId: "e-max-d7438",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const rtdb = firebase.database();

        let userUid, map, userMarker, currentRideId = null;

        auth.onAuthStateChanged(user => {
            if(user) {
                userUid = user.uid;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-ui').style.display = 'flex';
                initMap();
                loadProfile();
            }
        });

        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
        }

        // --- الخريطة واللوكيشن ---
        function initMap() {
            if(map) return;
            map = L.map('map', {zoomControl: false}).setView([30.0444, 31.2357], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            // تحديد اللوكيشن فوراً
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude, lng = p.coords.longitude;
                map.setView([lat, lng], 16);
                if(userMarker) map.removeLayer(userMarker);
                userMarker = L.marker([lat, lng]).addTo(map).bindPopup("موقعك الحالي").openPopup();
            }, () => alert("برجاء تفعيل اللوكيشن"));
        }

        // --- المحفظة ---
        function toggleWallet(show) { document.getElementById('wallet-screen').style.display = show ? 'flex' : 'none'; }
        function copyNum() { navigator.clipboard.writeText("010XXXXXXXX"); alert("تم نسخ الرقم!"); }
        function sendWalletRequest() {
            const amt = document.getElementById('w-amt').value, phone = document.getElementById('w-phone').value;
            if(!amt || !phone) return alert("اكمل البيانات");
            rtdb.ref('deposit_requests').push({ uid: userUid, amount: amt, from: phone, time: Date.now() });
            alert("طلبك وصل للأدمن!");
            toggleWallet(false);
        }

        // --- المزايدة والرحلة ---
        function requestRide() {
            const d = document.getElementById('dest').value;
            if(!d) return alert("اكتب الوجهة");
            const rideRef = rtdb.ref('rides/').push();
            currentRideId = rideRef.key;
            rideRef.set({ riderId: userUid, destination: d, status: 'searching' });
            document.getElementById('offers-screen').style.display = 'flex';
            listenToOffers();
        }

        function listenToOffers() {
            rtdb.ref('offers/' + currentRideId).on('child_added', snap => {
                const o = snap.val();
                const div = document.createElement('div');
                div.className = 'offer-card';
                div.innerHTML = `
                    <b>🚗 ${o.driverName}</b> <span style="color:var(--green)">(${o.price} ج.م)</span><br>
                    <small>السيارة: ${o.carModel || 'ملاكي'}</small><br>
                    <button class="btn btn-main" onclick="openActiveRide('${o.driverName}', '${o.price}', '${o.driverPhone}', '${o.carModel}', ${o.arrivalTime})">قبول العرض</button>
                `;
                document.getElementById('offers-list').appendChild(div);
            });
        }

        function openActiveRide(name, price, phone, car, time) {
            document.getElementById('offers-screen').style.display = 'none';
            document.getElementById('active-ride-screen').style.display = 'flex';
            document.getElementById('view-driver-name').innerText = name;
            document.getElementById('view-price').innerText = price + " ج.م";
            document.getElementById('view-car-model').innerText = "نوع السيارة: " + (car || "ملاكي");
            document.getElementById('call-driver').href = "tel:" + phone;
            
            let seconds = time * 60;
            const timerEl = document.getElementById('ride-timer');
            const itv = setInterval(() => {
                let m = Math.floor(seconds / 60), s = seconds % 60;
                timerEl.innerText = `متبقي ${m}:${s < 10 ? '0' : ''}${s} ويوصل`;
                if(seconds-- <= 0) { clearInterval(itv); timerEl.innerText = "وصل السائق! 🚕"; }
            }, 1000);
        }

        // --- الملف الشخصي ---
        function toggleSettings() { document.getElementById('settings-screen').classList.toggle('active'); }
        function saveProfile() {
            const n = document.getElementById('user-name').value, p = document.getElementById('user-phone').value;
            rtdb.ref('users/'+userUid+'/profile').set({name:n, phone:p}).then(() => { alert("تم الحفظ"); toggleSettings(); });
        }
        function loadProfile() {
            rtdb.ref('users/'+userUid+'/profile').on('value', s => {
                if(s.exists()){ document.getElementById('user-name').value = s.val().name; document.getElementById('user-phone').value = s.val().phone; }
            });
            rtdb.ref('users/'+userUid+'/balance').on('value', s => document.getElementById('balance').innerText = s.val() || 0);
        }

        function sendSOS() { alert("تم إرسال نداء استغاثة للطوارئ!"); rtdb.ref('sos').push({uid:userUid, time:Date.now()}); }
        function cancelSearch() { rtdb.ref('rides/'+currentRideId).remove(); document.getElementById('offers-screen').style.display='none'; }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
