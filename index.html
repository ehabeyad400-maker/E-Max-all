<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Max | Passenger</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --bg: #0b1120; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .login-card { background: var(--card); padding: 35px; border-radius: 25px; text-align: center; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .logo { font-size: 40px; font-weight: 800; margin-bottom: 25px; }
        .logo span { color: var(--accent); }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-google { background: white; color: black; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }

        /* الواجهة الأساسية */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        #map { flex-grow: 1; width: 100%; }
        
        #settings-panel { position: fixed; right: -320px; top: 0; width: 280px; height: 100%; background: var(--card); z-index: 10000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; border-left: 1px solid #334155; }
        #settings-panel.active { right: 0; }
        
        .wallet-btn { background: #10b981; color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <div class="logo">E-<span>Max</span></div>
            
            <button class="btn btn-google" onclick="loginWithGoogle()">
                <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" width="20">
                الدخول بواسطة جوجل
            </button>

            <div style="margin: 15px 0; color: #64748b; font-size: 14px;">أو سجل يدوياً</div>

            <input type="text" id="userName" placeholder="الاسم">
            <input type="tel" id="userPhone" placeholder="رقم الموبايل">
            <input type="password" id="userPass" placeholder="كلمة المرور">
            <button class="btn btn-primary" onclick="handleManualLogin()">دخول / تسجيل</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <button style="background:none; border:none; color:white; font-size:26px; cursor:pointer;" onclick="toggleSettings()">⚙️</button>
            <div style="font-weight:900; font-size:20px; letter-spacing:1px;">E-MAX</div>
            <button class="wallet-btn" onclick="openWalletModal()">💰 <span id="balance-val">0</span> ج.م</button>
        </header>
        <div id="map"></div>
    </div>

    <div id="settings-panel">
        <button style="background:none; border:none; color:white; font-size:28px; cursor:pointer;" onclick="toggleSettings()">✖</button>
        <div style="text-align:center; margin-top:40px;">
            <div style="width:80px; height:80px; background:var(--accent); border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:35px; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);">👤</div>
            <h3 id="p-name" style="margin-top:20px; font-size:22px;">الاسم</h3>
            <p id="p-phone" style="color:#94a3b8; font-size:14px;">01xxxxxxxxx</p>
        </div>
        <hr style="border:0.5px solid #334155; margin:30px 0;">
        <button onclick="logout()" style="width:100%; padding:12px; background:#ef4444; color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">تسجيل الخروج</button>
    </div>

    <script>
        // 2. إعدادات Firebase (من صورتك)
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            authDomain: "e-max-d7438.firebaseapp.com",
            projectId: "e-max-d7438",
            storageBucket: "e-max-d7438.firebasestorage.app",
            messagingSenderId: "394379576685",
            appId: "1:394379576685:web:a2ffe30d4132b5a62c4664"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const rtdb = firebase.database();

        // فحص الجلسة عند التحميل
        window.onload = () => {
            const saved = localStorage.getItem('emax_rider');
            if(saved) launchApp(JSON.parse(saved));
        };

        // وظيفة جوجل
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => {
                const data = { name: res.user.displayName, phone: "جوجل", balance: 0 };
                saveAndLaunch(data);
            }).catch(e => alert(e.message));
        }

        // وظيفة الموبايل (Realtime Database)
        function handleManualLogin() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const pass = document.getElementById('userPass').value;

            if(!phone || !pass) return alert("املا البيانات يا بطل");

            rtdb.ref('passengers/' + phone).once('value', s => {
                if(s.exists()) {
                    if(s.val().pass === pass) saveAndLaunch(s.val());
                    else alert("كلمة المرور غلط!");
                } else {
                    const newUser = { name: name || "عميل جديد", phone: phone, pass: pass, balance: 0 };
                    rtdb.ref('passengers/' + phone).set(newUser);
                    saveAndLaunch(newUser);
                }
            });
        }

        function saveAndLaunch(data) {
            localStorage.setItem('emax_rider', JSON.stringify(data));
            launchApp(data);
        }

        function launchApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('p-name').innerText = user.name;
            document.getElementById('p-phone').innerText = user.phone;

            // الخريطة والـ GPS
            const map = L.map('map').setView([30.0444, 31.2357], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    const lat = p.coords.latitude;
                    const lng = p.coords.longitude;
                    map.setView([lat, lng], 16);
                    L.marker([lat, lng]).addTo(map).bindPopup("أنت هنا").openPopup();
                });
            }
        }

        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }
        function logout() { localStorage.removeItem('emax_rider'); location.reload(); }
        function openWalletModal() { alert("جاري العمل على نظام شحن فودافون كاش الخاص بك.."); }
    </script>
</body>
</html>>
