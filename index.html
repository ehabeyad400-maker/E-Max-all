
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Max | الرحلة النشطة 🚕</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --green: #10b981; --red: #ef4444; --yellow: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        .screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; }

        /* شاشة الرحلة النشطة */
        #active-ride-screen { position: fixed; inset: 0; background: var(--bg); z-index: 15000; display: none; flex-direction: column; }
        .ride-header { background: var(--card); padding: 20px; border-radius: 0 0 30px 30px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .driver-info-box { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .timer-badge { background: var(--yellow); color: #000; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; margin: 15px 0; }
        
        #app-ui { display: none; flex-direction: column; height: 100vh; }
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #map { flex-grow: 1; z-index: 1; }

        #settings-screen { position: fixed; left: -100%; top: 0; width: 80%; max-width: 300px; height: 100%; background: var(--card); z-index: 12000; transition: 0.4s; padding: 20px; }
        #settings-screen.active { left: 0; }

        .controls { position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 20px; border-radius: 30px 30px 0 0; z-index: 1000; }
        #offers-screen { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 11000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .offer-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-right: 5px solid var(--accent); }
        
        .input-box { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-main { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <div class="card">
            <h1 style="color: var(--accent);">E-MAX</h1>
            <button class="btn btn-main" onclick="loginWithGoogle()">🔵 الدخول بحساب Google</button>
            <input type="email" id="email" class="input-box" placeholder="Email" style="margin-top:20px;">
            <input type="password" id="pass" class="input-box" placeholder="Password">
            <button class="btn" style="background: #334155; color: white;" onclick="handleAuth()">دخول / تسجيل</button>
        </div>
    </div>

    <div id="active-ride-screen">
        <div class="ride-header">
            <h3 style="margin:0;">رحلتك بدأت 🚗</h3>
            <div id="ride-timer" class="timer-badge">متبقي 00:00</div>
        </div>
        
        <div class="driver-info-box">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="80">
            <h2 id="view-driver-name" style="margin:5px 0;">اسم السائق</h2>
            <p id="view-car-model" style="color:var(--accent); margin:0;">نوع العربية: تويوتا كورولا</p>
            <div style="display:flex; gap:20px; margin-top:10px;">
                <div style="text-align:center;">
                    <small>السعر</small><br>
                    <b id="view-price" style="color:var(--green)">0 ج.م</b>
                </div>
                <div style="text-align:center;">
                    <small>التقييم</small><br>
                    <b style="color:var(--yellow)">⭐ 4.9</b>
                </div>
            </div>
            
            <a id="call-driver" href="#" class="btn btn-main" style="text-decoration:none; display:block; text-align:center; margin-top:20px; background:var(--green);">
                📞 اتصل بالسائق
            </a>
            <button class="btn" style="background:var(--red); color:white; margin-top:10px;" onclick="cancelRide()">إلغاء الرحلة</button>
        </div>
        <div id="mini-map" style="flex-grow:1; background:#000;">
            </div>
    </div>

    <div id="settings-screen">
        <h3>الملف الشخصي ⚙️</h3>
        <input type="text" id="user-name" class="input-box" placeholder="الاسم">
        <input type="tel" id="user-phone" class="input-box" placeholder="رقم الموبايل">
        <button class="btn btn-main" onclick="saveProfile()">حفظ</button>
        <button class="btn" onclick="toggleSettings()">رجوع</button>
    </div>

    <div id="offers-screen">
        <h2 style="text-align: center;">عروض السائقين 🔍</h2>
        <div id="offers-list" style="flex:1;"></div>
        <button class="btn" style="background:var(--red); color:white;" onclick="cancelSearch()">إلغاء البحث</button>
    </div>

    <div id="app-ui">
        <header>
            <div onclick="toggleSettings()" style="cursor:pointer;">⚙️</div>
            <div id="balance-box">💳 <span id="balance">0</span> ج.م</div>
            <div onclick="logout()" style="color:var(--red); cursor:pointer;">خروج</div>
        </header>
        <div id="map"></div>
        <div class="controls">
            <input type="text" id="dest" class="input-box" placeholder="رايح فين؟">
            <button class="btn btn-main" onclick="requestRide()">اطلب الآن</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            databaseURL: "https://e-max-d7438-default-rtdb.firebaseio.com/",
            projectId: "e-max-d7438",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const rtdb = firebase.database();

        let userUid, map, currentRideId = null;

        auth.onAuthStateChanged(user => {
            if(user) {
                userUid = user.uid;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-ui').style.display = 'flex';
                initMap();
                loadProfile();
            }
        });

        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
        }

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([30.0444, 31.2357], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // --- المزايدة وقبول العرض ---
        function requestRide() {
            const d = document.getElementById('dest').value;
            if(!d) return alert("اكتب وجهتك");
            const rideRef = rtdb.ref('rides/').push();
            currentRideId = rideRef.key;
            rideRef.set({ riderId: userUid, destination: d, status: 'searching' });
            document.getElementById('offers-screen').style.display = 'flex';
            listenToOffers();
        }

        function listenToOffers() {
            rtdb.ref('offers/' + currentRideId).on('child_added', snap => {
                const o = snap.val();
                const div = document.createElement('div');
                div.className = 'offer-card';
                div.innerHTML = `
                    <b>🚗 ${o.driverName}</b> - <span style="color:var(--green)">${o.price} ج.م</span><br>
                    <small>نوع السيارة: ${o.carModel || 'ملاكي'}</small><br>
                    <button class="btn btn-main" onclick="openActiveRide('${o.driverName}', '${o.price}', '${o.driverPhone}', '${o.carModel}', ${o.arrivalTime})">قبول العرض</button>
                `;
                document.getElementById('offers-list').appendChild(div);
            });
        }

        // --- فتح صفحة الرحلة النشطة ---
        function openActiveRide(name, price, phone, car, time) {
            document.getElementById('offers-screen').style.display = 'none';
            document.getElementById('active-ride-screen').style.display = 'flex';
            
            document.getElementById('view-driver-name').innerText = name;
            document.getElementById('view-price').innerText = price + " ج.م";
            document.getElementById('view-car-model').innerText = "نوع السيارة: " + (car || "ملاكي");
            document.getElementById('call-driver').href = "tel:" + phone;
            
            startCountdown(time);
        }

        function startCountdown(minutes) {
            let seconds = minutes * 60;
            const timerEl = document.getElementById('ride-timer');
            const interval = setInterval(() => {
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                timerEl.innerText = `متبقي ${m}:${s < 10 ? '0' : ''}${s} ويوصل`;
                if (seconds <= 0) {
                    clearInterval(interval);
                    timerEl.innerText = "السائق وصل! 🚕";
                }
                seconds--;
            }, 1000);
        }

        function cancelRide() {
            if(confirm("هل أنت متأكد من إلغاء الرحلة؟")) {
                document.getElementById('active-ride-screen').style.display = 'none';
                rtdb.ref('rides/' + currentRideId).update({status: 'cancelled'});
            }
        }

        function toggleSettings() { document.getElementById('settings-screen').classList.toggle('active'); }
        function saveProfile() {
            const n = document.getElementById('user-name').value, p = document.getElementById('user-phone').value;
            rtdb.ref('users/'+userUid+'/profile').set({name:n, phone:p});
            toggleSettings();
        }
        function loadProfile() {
            rtdb.ref('users/'+userUid+'/profile').once('value', s => {
                if(s.exists()){
                    document.getElementById('user-name').value = s.val().name;
                    document.getElementById('user-phone').value = s.val().phone;
                }
            });
            rtdb.ref('users/'+userUid+'/balance').on('value', s => document.getElementById('balance').innerText = s.val() || 0);
        }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
