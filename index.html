<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>E-Max | Test</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body style="background: #0b0f19; color: white; text-align: center; font-family: sans-serif; padding-top: 50px;">

    <h1>E-Max App</h1>
    <div id="status" style="color: #3b82f6;">جاري التحميل...</div>
    <br>
    <button onclick="loginWithGoogle()" style="padding: 15px 30px; cursor: pointer; border-radius: 10px; border: none; font-weight: bold;">
        اضغط هنا للتجربة (Google Login)
    </button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            authDomain: "e-max-d7438.firebaseapp.com",
            projectId: "e-max-d7438",
            storageBucket: "e-max-d7438.firebasestorage.app",
            messagingSenderId: "394379576685",
            appId: "1:394379576685:web:a2ffe30d4132b5a62c4664"
        };

        // تشغيل Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            document.getElementById('status').innerText = "تم الاتصال بـ Firebase بنجاح ✅";
        } catch (e) {
            document.getElementById('status').innerText = "خطأ في الإعدادات ❌";
            console.error(e);
        }

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    alert("أهلاً بك: " + result.user.displayName);
                })
                .catch((error) => {
                    alert("خطأ: " + error.message);
                });
        }
    </script>
</body>
</html>
