<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Max | النسخة الاحترافية</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --green: #10b981; --warn: #f59e0b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* واجهة اختيار المركبة */
        #vehicle-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .v-card { background: var(--card); width: 100%; max-width: 350px; padding: 20px; border-radius: 20px; margin: 10px 0; cursor: pointer; border: 2px solid transparent; text-align: center; transition: 0.3s; }
        .v-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        /* واجهة الخريطة */
        #app-ui { display: none; flex-direction: column; height: 100vh; }
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #map { flex-grow: 1; z-index: 1; }

        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-qr { position: fixed; bottom: 90px; right: 20px; z-index: 100; background: var(--warn); color: white; }
        
        #qr-container { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="vehicle-screen">
        <h2 style="margin-bottom:30px;">أهلاً بك في E-Max ✨</h2>
        <div class="v-card" onclick="initApp('عادية')">🚗 <b>عادية</b><br><small>رحلة اقتصادية</small></div>
        <div class="v-card" onclick="initApp('برو')">✨ <b>برو</b><br><small>سيارات فاخرة</small></div>
        <div class="v-card" onclick="initApp('موتوسيكل')">🏍️ <b>موتوسيكل</b><br><small>تجاوز الزحام</small></div>
    </div>

    <div id="app-ui">
        <header>
            <div style="font-weight:bold;">E-MAX</div>
            <div style="background:var(--green); padding:6px 15px; border-radius:20px; font-size:14px;">💰 <span id="bal-val">100</span> ج.م</div>
        </header>
        <div id="map"></div>
        
        <button class="btn btn-qr" onclick="startScanner()">📸 دفع QR</button>
        <button class="btn" style="position:fixed; bottom:20px; right:20px; z-index:100; background:var(--accent); color:white; width: 120px;" onclick="payWithStripe()">💳 شحن رصيد</button>
    </div>

    <div id="qr-container">
        <div id="qr-reader" style="width: 300px;"></div>
        <button class="btn" style="margin-top:20px; background:#ef4444; color:white;" onclick="stopScanner()">إغلاق</button>
    </div>

    <script>
        // إعدادات Firebase & Stripe من صورك
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            databaseURL: "https://e-max-d7438-default-rtdb.firebaseio.com/",
            projectId: "e-max-d7438",
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();
        const stripe = Stripe('pk_test_51TMEKmPTGh4ASvbJ2tCjC966K3Z6S6iX7p2K9WzJ9UvF6P8A7C9D0E1F2G3H4I5J6K7L8M9N0O');

        let scanner = null;
        let userBalance = 100;

        // وظيفة بدء التطبيق
        function initApp(type) {
            document.getElementById('vehicle-screen').style.display = 'none';
            document.getElementById('app-ui').style.display = 'flex';
            
            // تشغيل الخريطة
            const map = L.map('map').setView([30.0444, 31.2357], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            navigator.geolocation.getCurrentPosition(p => {
                map.setView([p.coords.latitude, p.coords.longitude], 16);
                L.marker([p.coords.latitude, p.coords.longitude]).addTo(map).bindPopup("موقعك الحالي").openPopup();
            });
        }

        // محاكاة الشحن بـ Stripe
        function payWithStripe() {
            alert("سيتم نقلك لصفحة الدفع.. استخدم كارت الاختبار 4242");
            userBalance += 50;
            document.getElementById('bal-val').innerText = userBalance;
        }

        // نظام الـ QR Code
        function startScanner() {
            document.getElementById('qr-container').style.display = 'flex';
            scanner = new Html5Qrcode("qr-reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                alert("تم دفع 50 جنيه للسائق بنجاح!");
                userBalance -= 50;
                document.getElementById('bal-val').innerText = userBalance;
                stopScanner();
            });
        }

        function stopScanner() {
            if(scanner) {
                scanner.stop().then(() => {
                    document.getElementById('qr-container').style.display = 'none';
                });
            } else {
                document.getElementById('qr-container').style.display = 'none';
            }
        }
    </script>
</body>
</html>
