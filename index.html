<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Max | النسخة المتكاملة 🚀</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --green: #10b981; --google: #db4437; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* شاشات الدخول والانتظار */
        #auth-screen, #vehicle-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .v-card { background: var(--card); width: 100%; padding: 15px; border-radius: 15px; margin: 10px 0; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .v-card:hover { border-color: var(--accent); transform: scale(1.02); }

        /* الواجهة الرئيسية */
        #app-ui { display: none; flex-direction: column; height: 100vh; }
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #map { flex-grow: 1; z-index: 1; }

        /* التحكم */
        .controls { position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 20px; border-radius: 25px 25px 0 0; z-index: 1000; box-sizing: border-box; }
        .input-box { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-main { background: var(--accent); color: white; }

        /* أيقونات العربيات */
        .car-icon { filter: hue-rotate(200deg); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="card">
            <h2 style="color: var(--accent);">E-MAX 🚕</h2>
            <button class="btn" style="background:var(--google); color:white;" onclick="loginWithGoogle()">الدخول بحساب Google</button>
            <p style="margin:10px 0; font-size:12px; color:#64748b;">أو بالبريد الإلكتروني</p>
            <input type="email" id="email" class="input-box" placeholder="Email">
            <input type="password" id="pass" class="input-box" placeholder="Password">
            <button class="btn btn-main" onclick="handleAuth()">دخول</button>
        </div>
    </div>

    <div id="vehicle-screen" style="display:none;">
        <div class="card">
            <h3>اختر رحلتك ✨</h3>
            <div class="v-card" onclick="startTrip('عادية')">🚗 عادية</div>
            <div class="v-card" onclick="startTrip('برو')">✨ برو</div>
            <div class="v-card" onclick="startTrip('موتوسيكل')">🏍️ موتوسيكل</div>
        </div>
    </div>

    <div id="app-ui">
        <header>
            <div onclick="location.reload()" style="cursor:pointer;">☰</div>
            <div id="status-text" style="font-weight:bold;">جاري تحديد موقعك...</div>
            <div style="color:var(--green);">💰 <span id="balance">0</span></div>
        </header>

        <div id="map"></div>

        <div class="controls">
            <input type="text" id="dest" class="input-box" placeholder="إلى أين تريد الذهاب؟">
            <button class="btn btn-main" id="request-btn" onclick="requestRide()">تأكيد طلب الرحلة ✅</button>
            <div id="driver-info" style="display:none; margin-top:10px; font-size:14px; color:var(--green);">
                🚖 السائق "أحمد" في الطريق إليك (تتبع على الخريطة)
            </div>
        </div>
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            authDomain: "e-max-d7438.firebaseapp.com",
            databaseURL: "https://e-max-d7438-default-rtdb.firebaseio.com/",
            projectId: "e-max-d7438",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const rtdb = firebase.database();

        let map, userMarker, driverMarker;
        let carsAround = [];

        // تذكر تسجيل الدخول
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('vehicle-screen').style.display = 'flex';
                syncData(user.uid);
            }
        });

        function loginWithGoogle() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }

        function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
        }

        function syncData(uid) {
            rtdb.ref('users/' + uid + '/balance').on('value', s => {
                document.getElementById('balance').innerText = s.val() || 0;
            });
        }

        function startTrip(type) {
            document.getElementById('vehicle-screen').style.display = 'none';
            document.getElementById('app-ui').style.display = 'flex';
            document.getElementById('status-text').innerText = "E-MAX " + type;
            initMap();
        }

        function initMap() {
            map = L.map('map').setView([30.0444, 31.2357], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude;
                const lng = p.coords.longitude;
                map.setView([lat, lng], 16);
                userMarker = L.marker([lat, lng]).addTo(map).bindPopup("موقعك الحالي").openPopup();
                
                // محاكاة عربيات حولك
                showNearbyCars(lat, lng);
            });
        }

        function showNearbyCars(lat, lng) {
            // إضافة 3 عربيات وهمية حول المستخدم
            for(let i=0; i<3; i++) {
                let cLat = lat + (Math.random() - 0.5) * 0.01;
                let cLng = lng + (Math.random() - 0.5) * 0.01;
                let car = L.marker([cLat, cLng], {
                    icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png', iconSize: [30, 30] })
                }).addTo(map);
                carsAround.push(car);
            }
        }

        function requestRide() {
            const d = document.getElementById('dest').value;
            if(!d) return alert("اكتب الوجهة!");
            
            document.getElementById('request-btn').innerText = "جاري البحث عن سائق...";
            
            // محاكاة تتبع السائق بعد 3 ثواني
            setTimeout(() => {
                document.getElementById('request-btn').style.display = 'none';
                document.getElementById('driver-info').style.display = 'block';
                startTrackingDriver();
            }, 3000);
        }

        function startTrackingDriver() {
            // مكان السائق الافتراضي (بعيد شوية)
            let dLat = userMarker.getLatLng().lat + 0.005;
            let dLng = userMarker.getLatLng().lng + 0.005;

            driverMarker = L.marker([dLat, dLng], {
                icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png', iconSize: [40, 40] })
            }).addTo(map).bindPopup("سائقك قادم").openPopup();

            // تحريك السائق تجاه المستخدم
            let interval = setInterval(() => {
                dLat -= 0.0001;
                dLng -= 0.0001;
                driverMarker.setLatLng([dLat, dLng]);

                // لو وصل عند المستخدم
                if(Math.abs(dLat - userMarker.getLatLng().lat) < 0.0002) {
                    clearInterval(interval);
                    alert("لقد وصلت سيارة E-Max! السائق بالخارج 🚕");
                    document.getElementById('status-text').innerText = "وصلت الرحلة ✅";
                }
            }, 1000);
        }
    </script>
</body>
</html>
