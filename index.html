<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-MAX | تطبيق الراكب</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --primary: #6366f1; --secondary: #4f46e5; --bg: #0f172a;
            --card: #1e293b; --text: #f8fafc; --accent: #10b981;
            --danger: #ef4444; --gold: #fbbf24;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* شاشات كاملة */
        .page { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .hidden { display: none !important; }

        /* البطاقات والحاويات */
        .card { background: var(--card); padding: 25px; border-radius: 24px; width: 100%; max-width: 450px; border: 1px solid #334155; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .input-group { width: 100%; margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        
        input, select {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155;
            background: #0f172a; color: white; outline: none; font-size: 16px;
        }

        .btn {
            border: none; padding: 16px; border-radius: 16px; font-weight: bold;
            cursor: pointer; width: 100%; transition: 0.3s; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid #334155; color: white; }

        /* الخريطة والواجهة الرئيسية */
        #main-map { flex: 1; width: 100%; z-index: 1; }
        header { padding: 15px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; z-index: 1000; }

        /* شريط الطلب السفلي */
        .booking-shelf {
            position: absolute; bottom: 20px; left: 15px; right: 15px; z-index: 1001;
            background: var(--card); padding: 20px; border-radius: 25px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5); border: 1px solid #334155;
        }

        /* نظام الرادار واستقبال العروض */
        #radar-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 2000; display: flex; flex-direction: column; padding: 20px; }
        .offer-card {
            background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 12px;
            border: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* المحفظة */
        .wallet-item { background: #0f172a; padding: 15px; border-radius: 15px; margin-top: 10px; border: 1px solid #334155; }

        /* الشات */
        #chat-screen { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; flex-direction: column; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; }
        .sent { background: var(--primary); align-self: flex-end; }
        .received { background: #334155; align-self: flex-start; }

        /* أنيميشن الرادار */
        .pulse-ring {
            width: 100px; height: 100px; border: 3px solid var(--primary); border-radius: 50%;
            position: relative; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body>

    <div id="page-auth" class="page">
        <div class="card">
            <h1 style="color:var(--primary); margin:0;">E-MAX</h1>
            <p style="color:#94a3b8; margin-bottom:25px;">أهلاً بك في عالم التنقل الذكي</p>
            <div class="input-group">
                <label>الاسم الكامل</label>
                <input type="text" id="auth-name" placeholder="أدخل اسمك">
            </div>
            <div class="input-group">
                <label>رقم الموبايل</label>
                <input type="tel" id="auth-phone" placeholder="01XXXXXXXXX">
            </div>
            <button class="btn btn-primary" onclick="app.register()">ابدأ الآن</button>
        </div>
    </div>

    <div id="page-main" class="hidden" style="height:100%; display:flex; flex-direction:column;">
        <header>
            <div style="background: #0f172a; padding: 8px 15px; border-radius: 50px; border: 1px solid #334155; cursor: pointer;" onclick="app.showWallet()">
                💰 <span id="ui-balance">0</span> ج.م
            </div>
            <b style="letter-spacing: 2px;">E-MAX</b>
            <div style="font-size: 20px; cursor: pointer;" onclick="location.reload()">🔄</div>
        </header>

        <div id="main-map"></div>

        <div id="ui-booking" class="booking-shelf">
            <div class="input-group" style="margin-bottom: 10px;">
                <input type="text" id="input-dest" placeholder="إلى أين تريد الذهاب؟">
            </div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <select id="input-payment" style="flex:1">
                    <option value="cash">💵 كاش</option>
                    <option value="wallet">💳 محفظة E-MAX</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="app.requestRide()">
                <span>🚀</span> اطلب E-MAX الآن
            </button>
        </div>

        <div id="ui-active" class="booking-shelf hidden">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                <div style="width:50px; height:50px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px;">🚕</div>
                <div>
                    <b id="ui-driver-name">جاري وصول السائق...</b><br>
                    <small id="ui-ride-price" style="color:var(--gold)"></small>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-outline" style="flex:1" onclick="app.toggleChat(true)">💬 دردشة</button>
                <a id="ui-call-btn" href="#" class="btn btn-accent" style="flex:1; text-decoration:none;">📞 اتصال</a>
            </div>
        </div>
    </div>

    <div id="page-radar" class="page hidden">
        <div class="pulse-ring"></div>
        <h2 style="margin-top:40px;">جاري البحث عن كباتن...</h2>
        <p style="color:var(--gold)">ستظهر عروض الأسعار هنا فوراً</p>
        
        <div id="offers-list" style="width:100%; max-width:450px; margin-top:20px;">
            </div>

        <button class="btn btn-outline" style="margin-top:20px; color:var(--danger);" onclick="app.cancelRide()">إلغاء الطلب</button>
    </div>

    <div id="page-wallet" class="page hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>محفظتي</h3>
                <span onclick="app.hideWallet()" style="cursor:pointer; font-size:24px;">×</span>
            </div>
            <div style="font-size:32px; font-weight:bold; margin:20px 0; color:var(--accent);">
                <span id="wallet-balance">0</span> ج.م
            </div>
            
            <div class="wallet-item" style="text-align:right;">
                <b style="color:var(--gold);">شحن رصيد (فودافون كاش)</b>
                <p style="font-size:12px; color:#94a3b8;">حول المبلغ لرقم الأدمن: 010XXXXXXXX</p>
                <input type="text" id="charge-ref" class="input-group" style="margin-top:10px;" placeholder="رقم العملية">
                <button class="btn btn-accent" style="padding:10px;" onclick="app.chargeWallet()">إرسال طلب شحن</button>
            </div>
        </div>
    </div>

    <div id="chat-screen" class="hidden">
        <header>
            <span onclick="app.toggleChat(false)" style="font-size:24px; cursor:pointer;">×</span>
            <b>الدردشة مع الكابتن</b>
            <div style="width:24px;"></div>
        </header>
        <div id="chat-msgs"></div>
        <div style="padding:15px; background:var(--card); display:flex; gap:10px;">
            <input type="text" id="chat-input" placeholder="اكتب رسالة...">
            <button class="btn btn-primary" style="width:80px;" onclick="app.sendMsg()">إرسال</button>
        </div>
    </div>

    <script>
        // --- إعدادات البرمجة ---
        const config = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            databaseURL: "https://e-max-d7438-default-rtdb.firebaseio.com/",
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        const auth = firebase.auth();

        const app = {
            user: null,
            userData: null,
            map: null,
            myMarker: null,
            driverMarker: null,
            currentLoc: null,
            activeRideId: null,

            init() {
                auth.onAuthStateChanged(u => {
                    if(u) {
                        this.user = u;
                        this.syncUser();
                    } else {
                        auth.signInAnonymously();
                    }
                });
            },

            register() {
                const name = document.getElementById('auth-name').value;
                const phone = document.getElementById('auth-phone').value;
                if(!name || !phone) return alert("اكمل البيانات يا بطل");
                
                db.ref('users/' + this.user.uid).set({
                    name, phone, balance: 0, createdAt: Date.now()
                });
            },

            syncUser() {
                db.ref('users/' + this.user.uid).on('value', snap => {
                    this.userData = snap.val();
                    if(this.userData) {
                        document.getElementById('page-auth').classList.add('hidden');
                        document.getElementById('page-main').classList.remove('hidden');
                        document.getElementById('ui-balance').innerText = this.userData.balance;
                        document.getElementById('wallet-balance').innerText = this.userData.balance;
                        this.initMap();
                        this.checkActiveRide();
                    }
                });
            },

            initMap() {
                if(this.map) return;
                this.map = L.map('main-map', { zoomControl: false }).setView([31.2, 29.9], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
                
                navigator.geolocation.watchPosition(p => {
                    this.currentLoc = { lat: p.coords.latitude, lng: p.coords.longitude };
                    if(!this.myMarker) {
                        this.myMarker = L.circleMarker([this.currentLoc.lat, this.currentLoc.lng], {radius:10, color:'#6366f1', fillOpacity:1}).addTo(this.map);
                    } else {
                        this.myMarker.setLatLng([this.currentLoc.lat, this.currentLoc.lng]);
                    }
                    this.map.panTo([this.currentLoc.lat, this.currentLoc.lng]);
                }, null, {enableHighAccuracy: true});
            },

            requestRide() {
                const dest = document.getElementById('input-dest').value;
                const pay = document.getElementById('input-payment').value;
                if(!dest) return alert("اكتب الوجهة رايح فين؟");

                const rideRef = db.ref('rides').push();
                this.activeRideId = rideRef.key;

                rideRef.set({
                    riderId: this.user.uid,
                    riderName: this.userData.name,
                    riderPhone: this.userData.phone,
                    destination: dest,
                    payMethod: pay,
                    status: 'searching',
                    riderLoc: this.currentLoc,
                    createdAt: Date.now()
                });

                document.getElementById('page-radar').classList.remove('hidden');
                this.listenForOffers();
            },

            listenForOffers() {
                db.ref(`rides/${this.activeRideId}/offers`).on('value', snap => {
                    const list = document.getElementById('offers-list');
                    list.innerHTML = "";
                    snap.forEach(child => {
                        const off = child.val();
                        const div = document.createElement('div');
                        div.className = "offer-card";
                        div.innerHTML = `
                            <div style="text-align:right">
                                <b>كابتن ${off.driverName}</b><br>
                                <span style="color:var(--accent); font-size:20px;">${off.offerPrice} ج.م</span>
                            </div>
                            <button class="btn btn-accent" style="width:auto; padding:10px 20px;" onclick="app.acceptOffer('${child.key}', ${off.offerPrice}, '${off.driverId}', '${off.driverName}', '${off.driverPhone}')">قبول</button>
                        `;
                        list.appendChild(div);
                    });
                });
            },

            acceptOffer(offerKey, price, dId, dName, dPhone) {
                db.ref(`rides/${this.activeRideId}`).update({
                    status: 'accepted',
                    driverId: dId,
                    driverName: dName,
                    driverPhone: dPhone,
                    finalPrice: price
                });
                document.getElementById('page-radar').classList.add('hidden');
            },

            checkActiveRide() {
                db.ref('rides').orderByChild('riderId').equalTo(this.user.uid).on('value', snap => {
                    snap.forEach(child => {
                        const r = child.val();
                        if(r.status === 'accepted') {
                            this.activeRideId = child.key;
                            document.getElementById('ui-booking').classList.add('hidden');
                            document.getElementById('ui-active').classList.remove('hidden');
                            document.getElementById('ui-driver-name').innerText = "الكابتن: " + r.driverName;
                            document.getElementById('ui-ride-price').innerText = "السعر المتفق عليه: " + r.finalPrice + " ج.م";
                            document.getElementById('ui-call-btn').href = "tel:" + r.driverPhone;
                            
                            if(r.driverLoc) {
                                if(!this.driverMarker) {
                                    this.driverMarker = L.marker([r.driverLoc.lat, r.driverLoc.lng]).addTo(this.map).bindPopup("الكابتن").openPopup();
                                } else {
                                    this.driverMarker.setLatLng([r.driverLoc.lat, r.driverLoc.lng]);
                                }
                            }
                            this.syncChat();
                        } else if (r.status === 'completed') {
                            alert("حمد الله على السلامة! تم إنهاء الرحلة.");
                            db.ref(`rides/${child.key}`).remove();
                            location.reload();
                        }
                    });
                });
            },

            sendMsg() {
                const txt = document.getElementById('chat-input').value;
                if(!txt) return;
                db.ref(`chats/${this.activeRideId}`).push({
                    sender: 'rider',
                    text: txt,
                    time: Date.now()
                });
                document.getElementById('chat-input').value = "";
            },

            syncChat() {
                db.ref(`chats/${this.activeRideId}`).on('child_added', snap => {
                    const m = snap.val();
                    const box = document.getElementById('chat-msgs');
                    const d = document.createElement('div');
                    d.className = `bubble ${m.sender === 'rider' ? 'sent' : 'received'}`;
                    d.innerText = m.text;
                    box.appendChild(d);
                    box.scrollTop = box.scrollHeight;
                });
            },

            showWallet() { document.getElementById('page-wallet').classList.remove('hidden'); },
            hideWallet() { document.getElementById('page-wallet').classList.add('hidden'); },
            toggleChat(s) { document.getElementById('chat-screen').classList.toggle('hidden', !s); },
            
            chargeWallet() {
                const ref = document.getElementById('charge-ref').value;
                if(!ref) return alert("اكتب رقم العملية");
                db.ref('admin_notices/deposits').push({
                    userId: this.user.uid,
                    userName: this.userData.name,
                    ref: ref,
                    time: Date.now()
                });
                alert("تم إرسال الطلب لإياد، سيتم إضافة الرصيد فور التأكد.");
            },

            cancelRide() {
                if(confirm("هل أنت متأكد من إلغاء الطلب؟")) {
                    db.ref(`rides/${this.activeRideId}`).remove();
                    location.reload();
                }
            }
        };

        app.init();
    </script>
</body>
</html>
