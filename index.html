<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Max | النسخة العملاقة 🚀</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --green: #10b981; --red: #ef4444; --yellow: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* الشاشات */
        .screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        #app-ui { display: none; flex-direction: column; height: 100vh; }
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #map { flex-grow: 1; z-index: 1; }

        /* التحكم والعروض */
        .controls { position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 20px; border-radius: 30px 30px 0 0; z-index: 1000; box-sizing: border-box; }
        #offers-screen { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 11000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .offer-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-right: 5px solid var(--accent); text-align: right; }
        
        .input-box { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sos { background: var(--red); color: white; width: 50px; height: 50px; border-radius: 50%; position: fixed; top: 80px; left: 20px; z-index: 500; font-size: 10px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <div class="card">
            <h1 style="color: var(--accent);">E-MAX</h1>
            <button class="btn btn-main" onclick="loginWithGoogle()">🔵 الدخول بحساب Google</button>
            <p style="font-size: 12px; margin-top: 15px; color: #64748b;">أو سجل بالبريد</p>
            <input type="email" id="email" class="input-box" placeholder="Email">
            <input type="password" id="pass" class="input-box" placeholder="Password">
            <button class="btn" style="background: #334155; color: white;" onclick="handleAuth()">دخول / تسجيل</button>
        </div>
    </div>

    <div id="wallet-screen" class="screen" style="display:none;">
        <div class="card">
            <h3 style="color: var(--green);">شحن رصيدك (كاش) 📱</h3>
            <div style="background:#0f172a; padding:15px; border-radius:15px; margin-bottom:15px;" onclick="copyNum()">
                <b id="v-num" style="color:var(--green); font-size:18px;">010XXXXXXXX</b><br>
                <small>(اضغط لنسخ الرقم)</small>
            </div>
            <input type="number" id="w-amt" class="input-box" placeholder="المبلغ اللي حولته">
            <input type="text" id="w-phone" class="input-box" placeholder="رقمك اللي حولت منه">
            <button class="btn btn-main" onclick="sendWalletRequest()">إرسال للأدمن</button>
            <button class="btn" style="background:none;" onclick="toggleWallet(false)">رجوع</button>
        </div>
    </div>

    <div id="offers-screen">
        <h2 style="text-align: center;">عروض السائقين 🔍</h2>
        <div id="offers-list" style="flex:1;">
            </div>
        <button class="btn" style="background:var(--red); color:white;" onclick="cancelSearch()">إلغاء الطلب</button>
    </div>

    <div id="app-ui">
        <header>
            <div onclick="toggleWallet(true)" style="background:var(--green); padding:5px 12px; border-radius:10px; cursor:pointer;">💳 <span id="balance">0</span> ج.م</div>
            <div style="font-weight:bold;">E-MAX</div>
            <div onclick="logout()" style="color:var(--red); cursor:pointer;">خروج</div>
        </header>

        <div id="map"></div>
        <div class="btn-sos" onclick="sendSOS()">SOS</div>

        <div class="controls">
            <input type="text" id="dest" class="input-box" placeholder="رايح فين النهاردة؟">
            <button class="btn btn-main" id="main-btn" onclick="requestRide()">اطلب وشوف العروض ✅</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            databaseURL: "https://e-max-d7438-default-rtdb.firebaseio.com/",
            projectId: "e-max-d7438",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const rtdb = firebase.database();

        let userUid, map, userMarker, currentRideId = null;
        let driverMarkers = {};

        // مراقبة الدخول
        auth.onAuthStateChanged(user => {
            if(user) {
                userUid = user.uid;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-ui').style.display = 'flex';
                initMap();
                syncUser();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
        }

        function syncUser() {
            rtdb.ref('users/' + userUid + '/balance').on('value', s => {
                document.getElementById('balance').innerText = s.val() || 0;
            });
        }

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([30.0444, 31.2357], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude, lng = p.coords.longitude;
                map.setView([lat, lng], 16);
                userMarker = L.marker([lat, lng]).addTo(map).bindPopup("أنت هنا").openPopup();
            });

            // جلب السواقين الحقيقيين (اللايف)
            rtdb.ref('drivers_online').on('value', snap => {
                const drivers = snap.val();
                for (let id in drivers) {
                    const d = drivers[id];
                    if (driverMarkers[id]) driverMarkers[id].setLatLng([d.lat, d.lng]);
                    else driverMarkers[id] = L.marker([d.lat, d.lng], {icon: L.icon({iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png', iconSize: [30, 30]})}).addTo(map);
                }
            });
        }

        // وظائف المحفظة اليدوية
        function toggleWallet(show) { document.getElementById('wallet-screen').style.display = show ? 'flex' : 'none'; }
        function copyNum() { navigator.clipboard.writeText("010XXXXXXXX"); alert("تم النسخ!"); }
        function sendWalletRequest() {
            const amt = document.getElementById('w-amt').value, phone = document.getElementById('w-phone').value;
            if(!amt || !phone) return alert("اكمل البيانات");
            rtdb.ref('deposit_requests').push({ uid: userUid, amount: amt, from: phone, status: 'pending' });
            alert("طلبك وصل للأدمن!");
            toggleWallet(false);
        }

        // نظام المزايدة (العروض)
        function requestRide() {
            const d = document.getElementById('dest').value;
            if(!d) return alert("اكتب الوجهة!");
            const rideRef = rtdb.ref('rides/').push();
            currentRideId = rideRef.key;
            rideRef.set({ riderId: userUid, destination: d, status: 'searching' });
            
            document.getElementById('offers-screen').style.display = 'flex';
            document.getElementById('offers-list').innerHTML = "";
            listenToOffers();
        }

        function listenToOffers() {
            rtdb.ref('offers/' + currentRideId).on('child_added', snap => {
                const o = snap.val();
                const div = document.createElement('div');
                div.className = 'offer-card';
                div.innerHTML = `
                    <b>🚗 ${o.driverName}</b> <span style="color:var(--green)">(${o.price} ج.م)</span><br>
                    <small>🕒 يصل في ${o.arrivalTime} دقيقة</small><br>
                    <button class="btn btn-main" style="margin-top:10px" onclick="acceptOffer('${o.price}')">قبول الرحلة</button>
                `;
                document.getElementById('offers-list').appendChild(div);
            });
        }

        function acceptOffer(price) {
            alert("تم قبول العرض بسعر " + price + " ج.م. السائق في طريقه إليك!");
            document.getElementById('offers-screen').style.display = 'none';
        }

        function cancelSearch() {
            rtdb.ref('rides/' + currentRideId).remove();
            document.getElementById('offers-screen').style.display = 'none';
        }

        function sendSOS() { alert("تم إرسال موقعك للطوارئ والأدمن!"); }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
