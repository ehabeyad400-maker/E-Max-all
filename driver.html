<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>E-Max | Driver</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; margin: 0; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 50px; border-radius: 35px; text-align: center; border: 1px solid #10b981; width: 90%; max-width: 400px; }
        .btn-google { background: white; color: black; padding: 15px; border-radius: 15px; border: none; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; }
        #dashboard { display: none; padding: 20px; text-align: center; width: 100%; }
    </style>
</head>
<body>
    <div id="auth-section" class="login-card">
        <h1 style="color:#10b981;">E-MAX DRIVER</h1>
        <p>سجل دخولك ككابتن وابدأ الرحلة</p>
        <button class="btn-google" onclick="driverGoogleLogin()">
            <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" width="25">
            الدخول بواسطة جوجل
        </button>
    </div>

    <div id="dashboard">
        <h1>أهلاً بك يا كابتن 🚕</h1>
        <div style="background:#1e293b; padding:20px; border-radius:15px;">في انتظار طلبات الركاب...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            authDomain: "e-max-d7438.firebaseapp.com",
            projectId: "e-max-d7438",
            storageBucket: "e-max-d7438.firebasestorage.app",
            messagingSenderId: "394379576685",
            appId: "1:394379576685:web:a2ffe30d4132b5a62c4664",
            measurementId: "G-MRQTSC468P"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function driverGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            }).catch(err => alert(err.message));
        }
    </script>
</body>
</html>
