<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Max | Captain</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #10b981; --text: #f8fafc; --blue: #3b82f6; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #map { flex: 1; width: 100%; }
        .header-ui { position: fixed; top: 10px; left: 10px; right: 10px; z-index: 1000; background: var(--card); padding: 12px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .ride-card { position: fixed; bottom: 15px; left: 15px; right: 15px; z-index: 1000; background: var(--card); padding: 20px; border-radius: 20px; border: 2px solid var(--blue); }
        .btn { border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; }

        /* شات السائق */
        #driver-chat { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; padding: 20px; }
        #msgs-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .m { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .m.me { background: var(--blue); align-self: flex-start; }
        .m.them { background: #334155; align-self: flex-end; }
    </style>
</head>
<body>

    <div class="header-ui">
        <b>كابتن E-Max 🚕</b>
        <span>💰 <span id="d-balance">0</span> ج.م</span>
    </div>

    <div id="map"></div>

    <div id="radar-ui" style="display:none" class="ride-card">
        <h4 id="req-dest" style="margin:0 0 10px 0;">📍 طلب رحلة جديد!</h4>
        <button class="btn" style="background:var(--blue); color:white" onclick="acceptRide()">قبول الرحلة وتواصل</button>
    </div>

    <div id="active-ui" style="display:none" class="ride-card">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button class="btn" style="background:var(--accent); color:white; flex:1" onclick="toggleChat(true)">💬 شات</button>
            <button class="btn" style="background:white; color:black; flex:1" onclick="finishRide()">إنهاء ✅</button>
        </div>
    </div>

    <div id="driver-chat">
        <div style="display:flex; justify-content:space-between;"><b>محادثة الراكب</b> <span onclick="toggleChat(false)">إغلاق ×</span></div>
        <div id="msgs-box"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="m-input" style="flex:1; padding:12px; border-radius:12px; border:none;" placeholder="اكتب للراكب...">
            <button class="btn" style="width:70px; background:var(--blue); color:white;" onclick="sendMsg()">إرسال</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* نفسها */ };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();
        let dUid, map, myMarker, riderMarker, activeRide;

        firebase.auth().onAuthStateChanged(user => {
            if(user) { dUid = user.uid; initMap(); listenToRides(); }
            else { firebase.auth().signInAnonymously(); }
        });

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([31.2, 29.9], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            navigator.geolocation.watchPosition(p => {
                const lat = p.coords.latitude, lng = p.coords.longitude;
                if(!myMarker) myMarker = L.circleMarker([lat, lng], {radius: 10, color: '#3b82f6', fillOpacity: 1}).addTo(map);
                else myMarker.setLatLng([lat, lng]);
                map.setView([lat, lng]);
                if(activeRide) rtdb.ref('rides/'+activeRide.id+'/driverLoc').set({lat, lng});
            }, null, {enableHighAccuracy: true});
        }

        function listenToRides() {
            rtdb.ref('rides').on('value', snap => {
                snap.forEach(child => {
                    const r = child.val();
                    if(r.status === 'searching') {
                        activeRide = {id: child.key, ...r};
                        document.getElementById('req-dest').innerText = "📍 " + r.destination;
                        document.getElementById('radar-ui').style.display = 'block';
                    }
                    if(r.status === 'accepted' && r.driverId === dUid) {
                        activeRide = {id: child.key, ...r};
                        document.getElementById('radar-ui').style.display = 'none';
                        document.getElementById('active-ui').style.display = 'block';
                        if(r.riderLoc) updateRiderMarker(r.riderLoc);
                        listenToChat();
                    }
                });
            });
        }

        function updateRiderMarker(loc) {
            if(!riderMarker) riderMarker = L.marker([loc.lat, loc.lng]).addTo(map).bindPopup("الراكب هنا").openPopup();
            else riderMarker.setLatLng([loc.lat, loc.lng]);
        }

        function acceptRide() {
            rtdb.ref('rides/'+activeRide.id).update({status: 'accepted', driverId: dUid});
        }

        function finishRide() {
            rtdb.ref('rides/'+activeRide.id).update({status: 'completed'}).then(() => location.reload());
        }

        // --- شات السائق ---
        function toggleChat(s) { document.getElementById('driver-chat').style.display = s ? 'flex' : 'none'; }
        function sendMsg() {
            const t = document.getElementById('m-input').value;
            if(!t) return;
            rtdb.ref('chats/'+activeRide.id).push({ sender: 'driver', text: t, time: Date.now() });
            document.getElementById('m-input').value = "";
        }
        function listenToChat() {
            rtdb.ref('chats/'+activeRide.id).off();
            rtdb.ref('chats/'+activeRide.id).on('child_added', snap => {
                const m = snap.val();
                const div = document.createElement('div');
                div.className = m.sender === 'driver' ? 'm me' : 'm them';
                div.innerText = m.text;
                document.getElementById('msgs-box').appendChild(div);
                document.getElementById('msgs-box').scrollTop = document.getElementById('msgs-box').scrollHeight;
            });
        }
    </script>
</body>
</html>
