<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Max | Captain Dashboard 🚕</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #10b981; --text: #f8fafc; --blue: #3b82f6; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .input-box { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--blue); color: white; }
        .ride-request { background: #0f172a; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #334155; }
    </style>
</head>
<body>

    <h2 style="text-align:center;">E-Max Captain 🚕</h2>

    <div id="reg-screen" class="card" style="display:none">
        <h3>انضم إلينا ككابتن 📋</h3>
        <input type="text" id="d-name" class="input-box" placeholder="الاسم الكامل">
        <input type="tel" id="d-phone" class="input-box" placeholder="رقم الموبايل">
        <input type="text" id="d-car" class="input-box" placeholder="نوع السيارة وموديلها">
        <input type="text" id="d-id" class="input-box" placeholder="رقم البطاقة">
        <button class="btn btn-primary" onclick="registerDriver()">إرسال بياناتي</button>
    </div>

    <div id="wait-screen" class="card" style="display:none; text-align:center;">
        <h1 style="font-size:50px;">⏳</h1>
        <h3>قيد المراجعة</h3>
        <p>الأدمن بيراجع حسابك دلوقتي.. أول ما تتقبل هتقدر تستلم رحلات.</p>
    </div>

    <div id="radar-screen" style="display:none">
        <div class="card">
            <h3 style="margin-top:0;">رادار الطلبات القريبة 📡</h3>
            <div id="rides-list"></div>
        </div>
    </div>

    <div id="active-ride-driver" style="display:none">
        <div class="card" style="border: 2px solid var(--accent)">
            <h2 style="color:var(--accent)">رحلة مقبولة ✅</h2>
            <hr style="border:0.5px solid #334155">
            <p><b>👤 اسم الراكب:</b> <span id="view-r-name">--</span></p>
            <p><b>🏁 الوجهة:</b> <span id="view-r-dest">--</span></p>
            <p><b>💰 السعر:</b> <span id="view-r-price">0</span> ج.م</p>
            <p><b>📞 تليفون الراكب:</b> <span id="view-r-phone">--</span></p>
            <a id="call-rider-btn" href="#" class="btn" style="background:var(--accent); color:white; text-decoration:none; display:block; text-align:center;">📞 اتصل بالراكب الآن</a>
            <button class="btn" style="margin-top:15px; background:var(--blue); color:white;" onclick="location.reload()">تم إنهاء الرحلة</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDvoxRxDa3WiUsCIdZmpy8w8hKRfgG4WdA",
            authDomain: "e-max-d7438.firebaseapp.com",
            databaseURL: "https://e-max-d7438-default-rtdb.firebaseio.com/",
            projectId: "e-max-d7438",
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();
        const auth = firebase.auth();

        let dUid, dData;

        auth.onAuthStateChanged(user => {
            if(user) {
                dUid = user.uid;
                checkStatus();
            } else { auth.signInAnonymously(); }
        });

        function registerDriver() {
            const data = {
                name: document.getElementById('d-name').value,
                phone: document.getElementById('d-phone').value,
                car: document.getElementById('d-car').value,
                id: document.getElementById('d-id').value,
                status: 'pending'
            };
            if(!data.name || !data.phone) return alert("اكمل البيانات");
            rtdb.ref('drivers/' + dUid).set(data);
        }

        function checkStatus() {
            rtdb.ref('drivers/' + dUid).on('value', snap => {
                const data = snap.val();
                dData = data;
                if(!data) document.getElementById('reg-screen').style.display = 'block';
                else if(data.status === 'pending') {
                    document.getElementById('reg-screen').style.display = 'none';
                    document.getElementById('wait-screen').style.display = 'block';
                } else if(data.status === 'approved') {
                    document.getElementById('reg-screen').style.display = 'none';
                    document.getElementById('wait-screen').style.display = 'none';
                    document.getElementById('radar-screen').style.display = 'block';
                    startRadar();
                }
            });
        }

        function startRadar() {
            rtdb.ref('rides').on('value', snap => {
                const list = document.getElementById('rides-list');
                list.innerHTML = "";
                snap.forEach(child => {
                    const ride = child.val();
                    if(ride.status === 'searching') {
                        const div = document.createElement('div');
                        div.className = 'ride-request';
                        div.innerHTML = `
                            <b>🏁 الوجهة: ${ride.destination}</b><br>
                            <small>الراكب: ${ride.riderName}</small><br>
                            <input type="number" id="p-${child.key}" class="input-box" placeholder="سعرك">
                            <input type="number" id="t-${child.key}" class="input-box" placeholder="وقت الوصول (دقائق)">
                            <button class="btn" style="background:var(--blue); color:white;" onclick="sendOffer('${child.key}')">تقديم عرض</button>
                        `;
                        list.appendChild(div);
                    } else if(ride.status === 'accepted' && ride.driverId === dUid) {
                        showActiveRide(ride);
                    }
                });
            });
        }

        function sendOffer(id) {
            const p = document.getElementById('p-'+id).value;
            const t = document.getElementById('t-'+id).value;
            if(!p || !t) return alert("حدد السعر والوقت");
            rtdb.ref('offers/'+id+'/'+dUid).set({
                driverName: dData.name, driverPhone: dData.phone,
                carModel: dData.car, price: p, arrivalTime: t
            });
            alert("تم إرسال العرض!");
        }

        function showActiveRide(ride) {
            document.getElementById('radar-screen').style.display = 'none';
            document.getElementById('active-ride-driver').style.display = 'block';
            document.getElementById('view-r-name').innerText = ride.riderName;
            document.getElementById('view-r-dest').innerText = ride.destination;
            document.getElementById('view-r-price').innerText = ride.finalPrice;
            document.getElementById('view-r-phone').innerText = ride.riderPhone;
            document.getElementById('call-rider-btn').href = "tel:" + ride.riderPhone;
        }
    </script>
</body>
</html>
