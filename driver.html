<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>E-Max | Driver Center</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #10b981; --dark: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); margin: 0; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .driver-login-container { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 50px; border-radius: 35px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); text-align: center; border: 1px solid rgba(16, 185, 129, 0.2); width: 90%; max-width: 450px; }
        .driver-login-container h1 { font-size: 42px; margin-bottom: 10px; color: var(--primary); }
        .driver-login-container p { color: #94a3b8; margin-bottom: 35px; }
        
        .btn-google-driver { background: #fff; color: #000; padding: 18px 30px; border-radius: 20px; font-weight: 900; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; font-size: 18px; transition: 0.4s; }
        .btn-google-driver:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        
        #driver-dashboard { display: none; width: 100%; height: 100%; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth-section" class="driver-login-container">
        <h1>E-MAX 🚕</h1>
        <p>كن كابتن في أكبر شبكة توصيل</p>
        <button class="btn-google-driver" onclick="googleLogin()">
            <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" width="30">
            ابدأ العمل الآن بجوجل
        </button>
    </div>

    <div id="driver-dashboard">
        <h2>لوحة الكابتن 🟢</h2>
        <div id="orders">في انتظار طلبات...</div>
    </div>

    <script>
        const firebaseConfig = { /* إعداداتك هنا */ };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const rtdb = firebase.database();

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('driver-dashboard').style.display = 'block';
            });
        }
    </script>
</body>
</html>
